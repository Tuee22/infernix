apiVersion: v2
name: infernix
description: Repo-owned Helm chart scaffold for the Infernix local HA platform.
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: harbor
    version: 1.18.3
    repository: https://helm.goharbor.io
    condition: upstreamCharts.harbor.enabled
  - name: pulsar
    version: 4.5.0
    repository: https://pulsar.apache.org/charts
    condition: upstreamCharts.pulsar.enabled
  - name: minio
    version: 17.0.21
    repository: https://charts.bitnami.com/bitnami
    condition: upstreamCharts.minio.enabled
  - name: ingress-nginx
    version: 4.15.1
    repository: https://kubernetes.github.io/ingress-nginx
    condition: upstreamCharts.ingressNginx.enabled
