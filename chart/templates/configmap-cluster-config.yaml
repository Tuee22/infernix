{{/*
Phase 4 Sprint 4.13 / Phase 8 Sprint 8.4: cluster manifest ConfigMap.

The `cluster.dhall` body is rendered by the `infernix` binary
(`Infernix.ClusterConfig.renderClusterConfig` from `defaultClusterConfig`)
and passed through `.Values.clusterConfig.body`. Helm only embeds that
string verbatim — there is no `let`/schema Dhall inside this template
(`infernix lint chart` rejects any). Coordinator + engine + demo pods mount
this ConfigMap read-only at `/opt/infernix/cluster.dhall`; the Haskell
daemon decodes it at startup via
`Infernix.ClusterConfig.decodeClusterConfigFile`.

Credentials are NOT in this ConfigMap. They live in
`Secret/infernix-cluster-secrets`, mounted at `/etc/infernix/secrets/`.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.clusterConfig.name }}
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-cluster-config
    app.kubernetes.io/component: cluster-config
data:
  cluster.dhall: |
{{ .Values.clusterConfig.body | nindent 4 }}
