{{/*
Phase 7 Sprint 7.7: stateless coordinator Deployment.

Owns Pulsar request-topic consumption, per-context Failover dispatcher
subscriptions, the result-bridge writeback to the conversation log, and
the lazy model-weight bootstrap subscription.

No PVC — coordinator state is broker-side (Pulsar subscription cursors
plus producer-side dedup). The deployment is demo-gated except in
production where the bootstrap subscription still runs on a single
coordinator-shape replica to honour the engine-only deployment shape.
*/}}
{{- if and .Values.daemonSplit.enabled .Values.coordinator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-coordinator
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-coordinator
    app.kubernetes.io/component: coordinator
spec:
  replicas: {{ .Values.coordinator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-coordinator
        app.kubernetes.io/component: coordinator
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: infernix-coordinator
                topologyKey: kubernetes.io/hostname
      containers:
        - name: infernix-coordinator
          image: "{{ .Values.coordinator.image.repository }}:{{ .Values.coordinator.image.tag }}"
          imagePullPolicy: {{ .Values.coordinator.image.pullPolicy }}
          command:
{{ toYaml .Values.coordinator.command | nindent 12 }}
          args:
{{ toYaml .Values.coordinator.args | nindent 12 }}
          env:
            - name: INFERNIX_CONTROL_PLANE_CONTEXT
              value: {{ .Values.controlPlaneContext | quote }}
            - name: INFERNIX_DAEMON_LOCATION
              value: "cluster-pod"
            - name: INFERNIX_DAEMON_ROLE
              value: "coordinator"
            - name: INFERNIX_CATALOG_SOURCE
              value: "mounted-configmap"
            - name: INFERNIX_DEMO_CONFIG_PATH
              value: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
            - name: INFERNIX_PUBLICATION_STATE_PATH
              value: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
            - name: INFERNIX_MINIO_ENDPOINT
              value: {{ .Values.service.minio.endpoint | quote }}
            - name: INFERNIX_MINIO_ACCESS_KEY
              value: {{ .Values.service.minio.accessKey | quote }}
            - name: INFERNIX_MINIO_SECRET_KEY
              value: {{ .Values.service.minio.secretKey | quote }}
            - name: INFERNIX_PULSAR_ADMIN_URL
              value: {{ .Values.service.pulsar.adminUrl | quote }}
            - name: INFERNIX_PULSAR_HTTP_BASE_URL
              value: {{ .Values.service.pulsar.httpBaseUrl | quote }}
            - name: INFERNIX_PULSAR_WS_BASE_URL
              value: {{ .Values.service.pulsar.webSocketBaseUrl | quote }}
            - name: INFERNIX_PULSAR_SERVICE_URL
              value: {{ .Values.service.pulsar.serviceUrl | quote }}
            - name: INFERNIX_PULSAR_TENANT
              value: {{ .Values.service.pulsar.tenant | quote }}
            - name: INFERNIX_PULSAR_NAMESPACE
              value: {{ .Values.service.pulsar.namespace | quote }}
          volumeMounts:
            - name: demo-config
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
              subPath: {{ .Values.demoConfig.fileName }}
              readOnly: true
            - name: publication-state
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
              subPath: {{ .Values.publication.fileName }}
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test -f /tmp/coordinator/subscription.ready
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120
      volumes:
        - name: demo-config
          configMap:
            name: {{ .Values.demoConfig.name }}
        - name: publication-state
          configMap:
            name: {{ .Values.publication.name }}
{{- end }}
