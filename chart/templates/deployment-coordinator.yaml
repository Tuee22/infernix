{{/*
Phase 7 Sprint 7.7: stateless coordinator Deployment.

Owns Pulsar request-topic consumption, per-context Failover dispatcher
subscriptions, the result-bridge writeback to the conversation log, and
the lazy model-weight bootstrap subscription.

No PVC — coordinator state is broker-side (Pulsar subscription cursors
plus producer-side dedup). The deployment is demo-gated except in
production where the bootstrap subscription still runs on a single
coordinator-shape replica to honour the engine-only deployment shape.
*/}}
{{- if and .Values.daemonSplit.enabled .Values.coordinator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-coordinator
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-coordinator
    app.kubernetes.io/component: coordinator
spec:
  replicas: {{ .Values.coordinator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-coordinator
        app.kubernetes.io/component: coordinator
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: infernix-coordinator
                topologyKey: kubernetes.io/hostname
      containers:
        - name: infernix-coordinator
          image: "{{ .Values.coordinator.image.repository }}:{{ .Values.coordinator.image.tag }}"
          imagePullPolicy: {{ .Values.coordinator.image.pullPolicy }}
          command:
{{ toYaml .Values.coordinator.command | nindent 12 }}
          # Phase 4 Sprint 4.13: daemon role is now a typed CLI arg
          # (`--role coordinator`) instead of an `INFERNIX_DAEMON_ROLE`
          # env var. The full `INFERNIX_PULSAR_*` env family is retired;
          # the daemon decodes those values from the mounted
          # `infernix-cluster-config` ConfigMap below at startup.
          # `INFERNIX_DATA_ROOT` stays as an env var for now (Phase 1
          # Sprint 1.11 deferred its retirement to the demo-deployment
          # rewiring that happens in Phase 7 Sprint 7.17).
          args:
            - service
            - --role
            - coordinator
          # Phase 7 Sprint 7.17: `INFERNIX_MINIO_ACCESS_KEY` /
          # `INFERNIX_MINIO_SECRET_KEY` env entries retire. The
          # supported flow mounts `Secret/infernix-cluster-secrets`
          # at `/etc/infernix/secrets/`; the daemon decodes
          # `InfernixSecrets.dhall` to find the credential file paths
          # and reads JSON-encoded credentials from those files. The
          # remaining `INFERNIX_DATA_ROOT` env entry is the supported
          # writable durable-state root for the subscription-ready
          # marker; an emptyDir volume backs it because Pulsar
          # subscription cursors live broker-side.
          env:
            - name: INFERNIX_DATA_ROOT
              value: "/srv/infernix/.data"
          volumeMounts:
            - name: cluster-config
              mountPath: /opt/infernix/cluster.dhall
              subPath: cluster.dhall
              readOnly: true
            - name: cluster-secrets
              mountPath: /etc/infernix/secrets
              readOnly: true
            - name: demo-config
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
              subPath: {{ .Values.demoConfig.fileName }}
              readOnly: true
            - name: publication-state
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
              subPath: {{ .Values.publication.fileName }}
              readOnly: true
            - name: coordinator-data
              mountPath: /srv/infernix/.data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test -f /srv/infernix/.data/runtime/service/subscription.ready
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120
      volumes:
        - name: demo-config
          configMap:
            name: {{ .Values.demoConfig.name }}
        - name: publication-state
          configMap:
            name: {{ .Values.publication.name }}
        - name: cluster-config
          configMap:
            name: {{ .Values.clusterConfig.name }}
        - name: cluster-secrets
          secret:
            secretName: infernix-cluster-secrets
        - name: coordinator-data
          emptyDir: {}
{{- end }}
