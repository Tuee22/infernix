{{/*
Phase 7 Sprint 7.7: stateless coordinator Deployment.

Owns Pulsar request-topic consumption, per-context Failover dispatcher
subscriptions, the result-bridge writeback to the conversation log, and
the lazy model-weight bootstrap subscription.

No PVC — coordinator state is broker-side (Pulsar subscription cursors
plus producer-side dedup). The deployment is production infrastructure:
`demo_ui = false` clusters keep the coordinator and engine pools while
omitting only demo-owned workloads and routes.
*/}}
{{- if and .Values.daemonSplit.enabled .Values.coordinator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-coordinator
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-coordinator
    app.kubernetes.io/component: coordinator
spec:
  replicas: {{ .Values.coordinator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-coordinator
        app.kubernetes.io/component: coordinator
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: infernix-coordinator
                topologyKey: kubernetes.io/hostname
      containers:
        - name: infernix-coordinator
          image: "{{ .Values.coordinator.image.repository }}:{{ .Values.coordinator.image.tag }}"
          imagePullPolicy: {{ .Values.coordinator.image.pullPolicy }}
          command:
{{ toYaml .Values.coordinator.command | nindent 12 }}
          # Phase 4 Sprint 4.13: daemon role is now a typed CLI arg
          # (`--role coordinator`) instead of an `INFERNIX_DAEMON_ROLE`
          # env var. The full `INFERNIX_PULSAR_*` env family is retired;
          # the daemon decodes those values from the mounted
          # `infernix-cluster-config` ConfigMap below at startup.
          # Phase 6 Sprint 6.28 follow-on (May 26, 2026): the
          # `INFERNIX_DATA_ROOT` env entry was retired together with
          # the chart path realignment from `/srv/infernix/.data` to
          # `/workspace/.data` (matching the baked
          # `InfernixHost.dhall.filesystem.dataRoot` default). The
          # daemon reads `dataRoot` from the manifest; the env var
          # was a redundant override the daemon never consumed once
          # the host manifest replaced env-var-driven path
          # discovery.
          args:
            - service
            - --role
            - coordinator
          # Phase 7 Sprint 7.17: credentials live in
          # `Secret/infernix-cluster-secrets` mounted at
          # `/etc/infernix/secrets/`; the daemon decodes
          # `InfernixSecrets.dhall` to find credential file paths and
          # reads JSON-encoded credentials from those files. No
          # `env:` block remains on the coordinator template.
          volumeMounts:
            - name: cluster-config
              mountPath: /opt/infernix/cluster.dhall
              subPath: cluster.dhall
              readOnly: true
            - name: cluster-secrets
              mountPath: /etc/infernix/secrets
              readOnly: true
            - name: demo-config
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
              subPath: {{ .Values.demoConfig.fileName }}
              readOnly: true
            - name: publication-state
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
              subPath: {{ .Values.publication.fileName }}
              readOnly: true
            - name: coordinator-data
              mountPath: /workspace/.data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test -f /workspace/.data/runtime/service/subscription.ready
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120
      volumes:
        - name: demo-config
          configMap:
            name: {{ .Values.demoConfig.name }}
        - name: publication-state
          configMap:
            name: {{ .Values.publication.name }}
        - name: cluster-config
          configMap:
            name: {{ .Values.clusterConfig.name }}
        - name: cluster-secrets
          secret:
            secretName: infernix-cluster-secrets
        - name: coordinator-data
          emptyDir: {}
{{- end }}
