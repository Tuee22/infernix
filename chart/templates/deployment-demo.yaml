{{- if .Values.demo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-demo
  namespace: platform
spec:
  replicas: {{ .Values.demo.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-demo
    spec:
      containers:
        - name: infernix-demo
          image: "{{ .Values.demo.image.repository }}:{{ .Values.demo.image.tag }}"
          imagePullPolicy: {{ .Values.demo.image.pullPolicy }}
          command:
            - infernix
          args:
            - service
            - --role
            - webapp
            - --config
            - "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
{{- with .Values.demo.resources }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
          # Phase 7 Sprint 7.17: credentials live in
          # `Secret/infernix-cluster-secrets` mounted at
          # `/etc/infernix/secrets/`. Phase 6 Sprint 6.28 follow-on
          # (May 26, 2026): the `INFERNIX_DATA_ROOT` env entry was
          # retired together with the chart path realignment to
          # `/workspace/.data` (matches the baked
          # `InfernixHost.dhall.filesystem.dataRoot` default the
          # demo daemon decodes at startup). No `env:` block remains
          # on the demo template.
          ports:
            - containerPort: {{ .Values.demo.port }}
          volumeMounts:
            - name: cluster-config
              mountPath: /opt/infernix/cluster.dhall
              subPath: cluster.dhall
              readOnly: true
            - name: cluster-secrets
              mountPath: /etc/infernix/secrets
              readOnly: true
            - name: demo-config
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
              subPath: {{ .Values.demoConfig.fileName }}
              readOnly: true
            - name: publication-state
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
              subPath: {{ .Values.publication.fileName }}
              readOnly: true
            - name: demo-data
              mountPath: /workspace/.data
      volumes:
        - name: cluster-config
          configMap:
            name: {{ .Values.clusterConfig.name }}
        - name: cluster-secrets
          secret:
            secretName: infernix-cluster-secrets
        - name: demo-config
          configMap:
            name: {{ .Values.demoConfig.name }}
        - name: publication-state
          configMap:
            name: {{ .Values.publication.name }}
        - name: demo-data
          emptyDir: {}
{{- end }}
