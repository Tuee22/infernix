{{- if .Values.demo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-demo
  namespace: platform
spec:
  replicas: {{ .Values.demo.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-demo
    spec:
      containers:
        - name: infernix-demo
          image: "{{ .Values.demo.image.repository }}:{{ .Values.demo.image.tag }}"
          imagePullPolicy: {{ .Values.demo.image.pullPolicy }}
          command:
            - infernix-demo
          args:
            - serve
            - --dhall
            - "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
            - --port
            - {{ .Values.demo.port | quote }}
          env:
            - name: INFERNIX_BIND_HOST
              value: "0.0.0.0"
            - name: INFERNIX_DEMO_BRIDGE_MODE
              value: "pulsar-daemon"
            - name: INFERNIX_PUBLICATION_STATE_PATH
              value: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
            - name: INFERNIX_DATA_ROOT
              value: "/srv/infernix/.data"
            - name: INFERNIX_PULSAR_ADMIN_URL
              value: {{ .Values.service.pulsar.adminUrl | quote }}
            - name: INFERNIX_PULSAR_WS_BASE_URL
              value: {{ .Values.service.pulsar.webSocketBaseUrl | quote }}
            # Phase 7 Sprint 7.9: MinIO endpoint + credentials for the
            # `/api/objects/{upload,download}` presigned URL minter. The
            # demo binary derives the SigV4 signing material from these
            # env vars; per-user bucket scope is enforced inside the
            # handler.
            - name: INFERNIX_MINIO_ENDPOINT
              value: {{ .Values.service.minio.endpoint | quote }}
            - name: INFERNIX_MINIO_ACCESS_KEY
              value: {{ .Values.service.minio.accessKey | quote }}
            - name: INFERNIX_MINIO_SECRET_KEY
              value: {{ .Values.service.minio.secretKey | quote }}
            - name: INFERNIX_MINIO_REGION
              value: "us-east-1"
            - name: INFERNIX_MINIO_PRESIGN_EXPIRY_SECONDS
              value: "900"
            # Phase 7 Sprint 7.1: Keycloak JWKS endpoint inside the
            # cluster, used by the WebSocket handshake and the
            # `/api/objects` handler to verify bearer JWTs without
            # round-tripping through the routed `/auth` edge.
            - name: INFERNIX_KEYCLOAK_JWKS_URL
              value: "http://infernix-keycloak.platform.svc.cluster.local:{{ .Values.keycloak.service.port }}/realms/{{ .Values.keycloak.realm.name }}/protocol/openid-connect/certs"
          ports:
            - containerPort: {{ .Values.demo.port }}
          volumeMounts:
            - name: demo-config
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
              subPath: {{ .Values.demoConfig.fileName }}
              readOnly: true
            - name: publication-state
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
              subPath: {{ .Values.publication.fileName }}
              readOnly: true
            - name: demo-data
              mountPath: /srv/infernix/.data
      volumes:
        - name: demo-config
          configMap:
            name: {{ .Values.demoConfig.name }}
        - name: publication-state
          configMap:
            name: {{ .Values.publication.name }}
        - name: demo-data
          emptyDir: {}
{{- end }}
