{{- if .Values.demo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-demo
  namespace: platform
spec:
  replicas: {{ .Values.demo.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-demo
    spec:
      containers:
        - name: infernix-demo
          image: "{{ .Values.demo.image.repository }}:{{ .Values.demo.image.tag }}"
          imagePullPolicy: {{ .Values.demo.image.pullPolicy }}
          command:
            - infernix-demo
          args:
            - serve
            - --dhall
            - "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
            - --port
            - {{ .Values.demo.port | quote }}
          # Phase 7 Sprint 7.17: `INFERNIX_MINIO_ACCESS_KEY` /
          # `INFERNIX_MINIO_SECRET_KEY` env entries retire. The
          # supported flow mounts `Secret/infernix-cluster-secrets`
          # at `/etc/infernix/secrets/` (see coordinator template
          # note). `INFERNIX_DATA_ROOT` is the writable durable-state
          # root for any subscription-ready marker the demo daemon
          # writes locally.
          env:
            - name: INFERNIX_DATA_ROOT
              value: "/srv/infernix/.data"
          ports:
            - containerPort: {{ .Values.demo.port }}
          volumeMounts:
            - name: cluster-config
              mountPath: /opt/infernix/cluster.dhall
              subPath: cluster.dhall
              readOnly: true
            - name: cluster-secrets
              mountPath: /etc/infernix/secrets
              readOnly: true
            - name: demo-config
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
              subPath: {{ .Values.demoConfig.fileName }}
              readOnly: true
            - name: publication-state
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
              subPath: {{ .Values.publication.fileName }}
              readOnly: true
            - name: demo-data
              mountPath: /srv/infernix/.data
      volumes:
        - name: cluster-config
          configMap:
            name: {{ .Values.clusterConfig.name }}
        - name: cluster-secrets
          secret:
            secretName: infernix-cluster-secrets
        - name: demo-config
          configMap:
            name: {{ .Values.demoConfig.name }}
        - name: publication-state
          configMap:
            name: {{ .Values.publication.name }}
        - name: demo-data
          emptyDir: {}
{{- end }}
