{{/*
Phase 7 Sprint 7.7: stateful engine Deployment.

Hosts the adapter-side inference engine and the per-pod KV cache. The
ephemeral `model-cache` volume holds model weights pulled from
`infernix-models` MinIO on first use; the adapter-side LRU eviction keeps
the on-disk footprint under `engine.modelCache.sizeLimit` so kubelet does
not restart the pod for ephemeral-storage exhaustion.

The pod anti-affinity rule is `required` (not `preferred`) because two
engine pods on the same node give zero performance gain — they would
contend for the same GPU and double-cache the same weights. On a
multi-GPU node the single scheduled engine claims every device via
`nvidia.com/gpu` and the active substrate `.dhall` decides per-device
model assignment.
*/}}
{{- if and .Values.daemonSplit.enabled .Values.engine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-engine
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-engine
    app.kubernetes.io/component: engine
spec:
  replicas: {{ .Values.engine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-engine
        app.kubernetes.io/component: engine
    spec:
{{- if eq .Values.runtimeMode "linux-gpu" }}
      runtimeClassName: nvidia
      nodeSelector:
        infernix.runtime/gpu: "true"
{{- end }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: infernix-engine
              topologyKey: kubernetes.io/hostname
      containers:
        - name: infernix-engine
          image: "{{ .Values.engine.image.repository }}:{{ .Values.engine.image.tag }}"
          imagePullPolicy: {{ .Values.engine.image.pullPolicy }}
          command:
{{ toYaml .Values.engine.command | nindent 12 }}
          args:
{{ toYaml .Values.engine.args | nindent 12 }}
          env:
            - name: INFERNIX_CONTROL_PLANE_CONTEXT
              value: {{ .Values.controlPlaneContext | quote }}
            - name: INFERNIX_DAEMON_LOCATION
              value: "cluster-pod"
            - name: INFERNIX_DAEMON_ROLE
              value: "engine"
            - name: INFERNIX_CATALOG_SOURCE
              value: "mounted-configmap"
            - name: INFERNIX_DEMO_CONFIG_PATH
              value: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
            - name: INFERNIX_PUBLICATION_STATE_PATH
              value: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
            - name: INFERNIX_DATA_ROOT
              value: "/srv/infernix/.data"
            - name: INFERNIX_MODEL_CACHE_ROOT
              value: /model-cache
            - name: INFERNIX_MINIO_ENDPOINT
              value: {{ .Values.service.minio.endpoint | quote }}
            - name: INFERNIX_MINIO_ACCESS_KEY
              value: {{ .Values.service.minio.accessKey | quote }}
            - name: INFERNIX_MINIO_SECRET_KEY
              value: {{ .Values.service.minio.secretKey | quote }}
            # Phase 7 Sprint 7.7: model_cache.py uses boto3 SigV4 to GET
            # weights from infernix-models on first use; explicit region
            # avoids drift across substrates.
            - name: INFERNIX_MINIO_REGION
              value: "us-east-1"
            - name: INFERNIX_PULSAR_ADMIN_URL
              value: {{ .Values.service.pulsar.adminUrl | quote }}
            - name: INFERNIX_PULSAR_HTTP_BASE_URL
              value: {{ .Values.service.pulsar.httpBaseUrl | quote }}
            - name: INFERNIX_PULSAR_WS_BASE_URL
              value: {{ .Values.service.pulsar.webSocketBaseUrl | quote }}
            - name: INFERNIX_PULSAR_SERVICE_URL
              value: {{ .Values.service.pulsar.serviceUrl | quote }}
            - name: INFERNIX_PULSAR_TENANT
              value: {{ .Values.service.pulsar.tenant | quote }}
            - name: INFERNIX_PULSAR_NAMESPACE
              value: {{ .Values.service.pulsar.namespace | quote }}
{{- range $name, $value := .Values.service.engineAdapters.commandEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- if eq .Values.runtimeMode "linux-gpu" }}
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
{{- end }}
          volumeMounts:
            - name: demo-config
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
              subPath: {{ .Values.demoConfig.fileName }}
              readOnly: true
            - name: publication-state
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
              subPath: {{ .Values.publication.fileName }}
              readOnly: true
            - name: engine-data
              mountPath: /srv/infernix/.data
            - name: model-cache
              mountPath: /model-cache
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test -f /srv/infernix/.data/runtime/service/subscription.ready
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120
      volumes:
        - name: demo-config
          configMap:
            name: {{ .Values.demoConfig.name }}
        - name: publication-state
          configMap:
            name: {{ .Values.publication.name }}
        - name: engine-data
          emptyDir: {}
        - name: model-cache
          emptyDir:
            sizeLimit: {{ .Values.engine.modelCache.sizeLimit }}
{{- end }}
