{{/*
Phase 7 Sprint 7.7: stateful engine Deployment.

Hosts the adapter-side inference engine and the per-pod KV cache. The
ephemeral `model-cache` volume holds model weights pulled from
`infernix-models` MinIO on first use; the adapter-side LRU eviction keeps
the on-disk footprint under `engine.modelCache.sizeLimit` so kubelet does
not restart the pod for ephemeral-storage exhaustion.

The pod anti-affinity rule is `required` (not `preferred`) because two
engine pods on the same node give zero performance gain — they would
contend for the same GPU and double-cache the same weights. On a
multi-GPU node each scheduled engine claims one device via
`nvidia.com/gpu`; per-device model assignment is owned by the active
substrate `.dhall` and operator-supplied replica values.
*/}}
{{- if and .Values.daemonSplit.enabled .Values.engine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-engine
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-engine
    app.kubernetes.io/component: engine
spec:
  replicas: {{ .Values.engine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-engine
        app.kubernetes.io/component: engine
    spec:
{{- if eq .Values.runtimeMode "linux-gpu" }}
      runtimeClassName: nvidia
      nodeSelector:
        infernix.runtime/gpu: "true"
{{- end }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: infernix-engine
              topologyKey: kubernetes.io/hostname
      containers:
        - name: infernix-engine
          image: "{{ .Values.engine.image.repository }}:{{ .Values.engine.image.tag }}"
          imagePullPolicy: {{ .Values.engine.image.pullPolicy }}
          command:
{{ toYaml .Values.engine.command | nindent 12 }}
          # Phase 4 Sprint 4.13: daemon role is now a typed CLI arg
          # (`--role engine`) instead of an `INFERNIX_DAEMON_ROLE` env
          # var. The full `INFERNIX_PULSAR_*` env family is retired;
          # the daemon decodes those values from the mounted
          # `infernix-cluster-config` ConfigMap at startup.
          # `INFERNIX_ENGINE_COMMAND_*` overrides have moved to the
          # `engine.commandOverrides` field on the cluster manifest.
          # Phase 6 Sprint 6.28 follow-on (May 26, 2026): the
          # `INFERNIX_DATA_ROOT` env entry was retired together with
          # the chart path realignment from `/srv/infernix/.data` to
          # `/workspace/.data` (matching the baked
          # `InfernixHost.dhall.filesystem.dataRoot` default). The
          # `INFERNIX_MODEL_CACHE_ROOT` env entry was also retired —
          # `Paths.modelCacheRoot` derives from the host manifest's
          # `runtimeRoot </> "model-cache"` and the engine's
          # adapter-driven cache materialization writes there
          # directly (the previously-mounted `/model-cache` emptyDir
          # was unused — the daemon never consumed the env override).
          args:
            - service
            - --role
            - engine
          # Phase 7 Sprint 7.17: credentials live in
          # `Secret/infernix-cluster-secrets` mounted at
          # `/etc/infernix/secrets/`; no `env:` block remains on the
          # engine template.
          resources:
            limits:
{{- with .Values.engine.resources.limits }}
{{ toYaml . | nindent 14 }}
{{- end }}
{{- if eq .Values.runtimeMode "linux-gpu" }}
              nvidia.com/gpu: "1"
{{- end }}
            requests:
{{- with .Values.engine.resources.requests }}
{{ toYaml . | nindent 14 }}
{{- end }}
{{- if eq .Values.runtimeMode "linux-gpu" }}
              nvidia.com/gpu: "1"
{{- end }}
          volumeMounts:
            - name: cluster-config
              mountPath: /opt/infernix/cluster.dhall
              subPath: cluster.dhall
              readOnly: true
            - name: cluster-secrets
              mountPath: /etc/infernix/secrets
              readOnly: true
            - name: demo-config
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
              subPath: {{ .Values.demoConfig.fileName }}
              readOnly: true
            - name: publication-state
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
              subPath: {{ .Values.publication.fileName }}
              readOnly: true
            - name: engine-data
              mountPath: /workspace/.data
            - name: model-cache
              mountPath: /model-cache
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test -f /workspace/.data/runtime/service/subscription.ready
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120
      volumes:
        - name: cluster-config
          configMap:
            name: {{ .Values.clusterConfig.name }}
        - name: cluster-secrets
          secret:
            secretName: infernix-cluster-secrets
        - name: demo-config
          configMap:
            name: {{ .Values.demoConfig.name }}
        - name: publication-state
          configMap:
            name: {{ .Values.publication.name }}
        - name: engine-data
          emptyDir: {}
        - name: model-cache
          emptyDir:
            sizeLimit: {{ .Values.engine.modelCache.sizeLimit }}
{{- end }}
{{- $root := . }}
{{- if and .Values.daemonSplit.enabled .Values.engine.enabled .Values.engine.perEngine.enabled }}
{{- range $engineName := .Values.engine.perEngine.names }}
{{- $image := index $root.Values.engine.perEngine.images $engineName }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-engine-{{ $engineName }}
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-engine-{{ $engineName }}
    app.kubernetes.io/component: engine
    infernix.io/engine: {{ $engineName | quote }}
spec:
  replicas: {{ $root.Values.engine.perEngine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-engine-{{ $engineName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-engine-{{ $engineName }}
        app.kubernetes.io/component: engine
        infernix.io/engine: {{ $engineName | quote }}
    spec:
{{- if eq $root.Values.runtimeMode "linux-gpu" }}
      runtimeClassName: nvidia
      nodeSelector:
        infernix.runtime/gpu: "true"
{{- end }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: infernix-engine-{{ $engineName }}
              topologyKey: kubernetes.io/hostname
      containers:
        - name: infernix-engine
          image: "{{ $image.repository }}:{{ $image.tag }}"
          imagePullPolicy: {{ $image.pullPolicy }}
          command:
{{ toYaml $root.Values.engine.command | nindent 12 }}
          args:
            - service
            - --role
            - engine
            - --engine-name
            - {{ $engineName | quote }}
          resources:
            limits:
{{- with $root.Values.engine.resources.limits }}
{{ toYaml . | nindent 14 }}
{{- end }}
{{- if eq $root.Values.runtimeMode "linux-gpu" }}
              nvidia.com/gpu: "1"
{{- end }}
            requests:
{{- with $root.Values.engine.resources.requests }}
{{ toYaml . | nindent 14 }}
{{- end }}
{{- if eq $root.Values.runtimeMode "linux-gpu" }}
              nvidia.com/gpu: "1"
{{- end }}
          volumeMounts:
            - name: cluster-config
              mountPath: /opt/infernix/cluster.dhall
              subPath: cluster.dhall
              readOnly: true
            - name: cluster-secrets
              mountPath: /etc/infernix/secrets
              readOnly: true
            - name: demo-config
              mountPath: "{{ $root.Values.demoConfig.mountPath }}/{{ $root.Values.demoConfig.fileName }}"
              subPath: {{ $root.Values.demoConfig.fileName }}
              readOnly: true
            - name: publication-state
              mountPath: "{{ $root.Values.demoConfig.mountPath }}/{{ $root.Values.publication.fileName }}"
              subPath: {{ $root.Values.publication.fileName }}
              readOnly: true
            - name: engine-data
              mountPath: /workspace/.data
            - name: model-cache
              mountPath: /model-cache
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test -f /workspace/.data/runtime/service/subscription.ready
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120
      volumes:
        - name: cluster-config
          configMap:
            name: {{ $root.Values.clusterConfig.name }}
        - name: cluster-secrets
          secret:
            secretName: infernix-cluster-secrets
        - name: demo-config
          configMap:
            name: {{ $root.Values.demoConfig.name }}
        - name: publication-state
          configMap:
            name: {{ $root.Values.publication.name }}
        - name: engine-data
          emptyDir: {}
        - name: model-cache
          emptyDir:
            sizeLimit: {{ $root.Values.engine.modelCache.sizeLimit }}
{{- end }}
{{- end }}
