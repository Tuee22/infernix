{{/*
Phase 7 Sprint 7.7: stateful engine Deployment.

Hosts the adapter-side inference engine and the per-pod KV cache. The
ephemeral `model-cache` volume holds model weights pulled from
`infernix-models` MinIO on first use; the adapter-side LRU eviction keeps
the on-disk footprint under `engine.modelCache.sizeLimit` so kubelet does
not restart the pod for ephemeral-storage exhaustion.

The pod anti-affinity rule is `required` (not `preferred`) because two
engine pods on the same node give zero performance gain — they would
contend for the same GPU and double-cache the same weights. On a
multi-GPU node the single scheduled engine claims every device via
`nvidia.com/gpu` and the active substrate `.dhall` decides per-device
model assignment.
*/}}
{{- if and .Values.daemonSplit.enabled .Values.engine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-engine
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-engine
    app.kubernetes.io/component: engine
spec:
  replicas: {{ .Values.engine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-engine
        app.kubernetes.io/component: engine
    spec:
{{- if eq .Values.runtimeMode "linux-gpu" }}
      runtimeClassName: nvidia
      nodeSelector:
        infernix.runtime/gpu: "true"
{{- end }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: infernix-engine
              topologyKey: kubernetes.io/hostname
      containers:
        - name: infernix-engine
          image: "{{ .Values.engine.image.repository }}:{{ .Values.engine.image.tag }}"
          imagePullPolicy: {{ .Values.engine.image.pullPolicy }}
          command:
{{ toYaml .Values.engine.command | nindent 12 }}
          # Phase 4 Sprint 4.13: daemon role is now a typed CLI arg
          # (`--role engine`) instead of an `INFERNIX_DAEMON_ROLE` env
          # var. The full `INFERNIX_PULSAR_*` env family is retired;
          # the daemon decodes those values from the mounted
          # `infernix-cluster-config` ConfigMap at startup. The retained
          # `INFERNIX_MODEL_CACHE_ROOT` + `INFERNIX_DATA_ROOT` env vars
          # are scheduled to retire together with the Python adapter
          # env-var sweep in Phase 5 Sprint 5.9 (model-cache root) and
          # Phase 7 Sprint 7.17 (demo deployment).
          # `INFERNIX_ENGINE_COMMAND_*` overrides have moved to the
          # `engine.commandOverrides` field on the cluster manifest;
          # the chart no longer materializes per-binding env entries.
          args:
            - service
            - --role
            - engine
          # Phase 7 Sprint 7.17: `INFERNIX_MINIO_ACCESS_KEY` /
          # `INFERNIX_MINIO_SECRET_KEY` env entries retire (see
          # coordinator template note). `INFERNIX_DATA_ROOT` +
          # `INFERNIX_MODEL_CACHE_ROOT` are the two remaining residual
          # entries; both are pure path declarations the engine binary
          # consumes for in-pod local state — both can move to a typed
          # arg or to a `ClusterConfig.engine.*` field in a focused
          # follow-up, but neither is sensitive material so the
          # closure here matches the "no credential env" rule.
          env:
            - name: INFERNIX_DATA_ROOT
              value: "/srv/infernix/.data"
            - name: INFERNIX_MODEL_CACHE_ROOT
              value: /model-cache
{{- if eq .Values.runtimeMode "linux-gpu" }}
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
{{- end }}
          volumeMounts:
            - name: cluster-config
              mountPath: /opt/infernix/cluster.dhall
              subPath: cluster.dhall
              readOnly: true
            - name: cluster-secrets
              mountPath: /etc/infernix/secrets
              readOnly: true
            - name: demo-config
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
              subPath: {{ .Values.demoConfig.fileName }}
              readOnly: true
            - name: publication-state
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.publication.fileName }}"
              subPath: {{ .Values.publication.fileName }}
              readOnly: true
            - name: engine-data
              mountPath: /srv/infernix/.data
            - name: model-cache
              mountPath: /model-cache
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test -f /srv/infernix/.data/runtime/service/subscription.ready
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120
      volumes:
        - name: cluster-config
          configMap:
            name: {{ .Values.clusterConfig.name }}
        - name: cluster-secrets
          secret:
            secretName: infernix-cluster-secrets
        - name: demo-config
          configMap:
            name: {{ .Values.demoConfig.name }}
        - name: publication-state
          configMap:
            name: {{ .Values.publication.name }}
        - name: engine-data
          emptyDir: {}
        - name: model-cache
          emptyDir:
            sizeLimit: {{ .Values.engine.modelCache.sizeLimit }}
{{- end }}
