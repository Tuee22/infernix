apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-web
  namespace: platform
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-web
    spec:
      containers:
        - name: infernix-web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          env:
            - name: INFERNIX_RUNTIME_MODE
              value: {{ .Values.runtimeMode | quote }}
          ports:
            - containerPort: {{ .Values.web.port }}
          volumeMounts:
            - name: demo-config
              mountPath: "{{ .Values.demoConfig.mountPath }}/{{ .Values.demoConfig.fileName }}"
              subPath: {{ .Values.demoConfig.fileName }}
              readOnly: true
      volumes:
        - name: demo-config
          configMap:
            name: {{ .Values.demoConfig.name }}
