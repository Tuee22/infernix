{{- if .Values.demo.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infernix-demo-api
  namespace: platform
  annotations:
    infernix.io/purpose: Demo API
spec:
  parentRefs:
    - name: infernix-edge
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: infernix-demo
          port: 80
{{- end }}
