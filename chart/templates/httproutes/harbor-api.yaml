apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infernix-harbor-api
  namespace: platform
  annotations:
    infernix.io/purpose: Harbor API
spec:
  parentRefs:
    - name: infernix-edge
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /harbor/api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api
      backendRefs:
        - name: infernix-harbor-core
          port: 80
