apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infernix-harbor-portal
  namespace: platform
  annotations:
    infernix.io/purpose: Harbor portal
spec:
  parentRefs:
    - name: infernix-edge
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /harbor
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: infernix-harbor-portal
          port: 80
