apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infernix-pulsar-admin
  namespace: platform
  annotations:
    infernix.io/purpose: Pulsar admin surface
spec:
  parentRefs:
    - name: infernix-edge
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /pulsar/admin
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: infernix-infernix-pulsar-proxy
          port: 80
