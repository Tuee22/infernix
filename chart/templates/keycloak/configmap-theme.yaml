{{- if and .Values.demo.enabled .Values.keycloak.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: infernix-keycloak-theme
  namespace: platform
data:
  theme.properties: |
    parent=keycloak.v2
    locales=en
    styles=css/login.css css/infernix.css
  messages_en.properties: |
    loginAccountTitle=Sign in to Infernix
    registerTitle=Create your Infernix account
    doLogIn=Sign in
    doRegister=Create account
    backToLogin=Back to sign in
  infernix.css: |
    :root {
      color-scheme: light;
      --infernix-bg: #eef3f6;
      --infernix-surface: #ffffff;
      --infernix-surface-alt: #f6f9fa;
      --infernix-ink: #142027;
      --infernix-muted: #536670;
      --infernix-line: #cdd8dd;
      --infernix-accent: #176b87;
      --infernix-accent-strong: #0c4e63;
      --infernix-danger: #a43b3b;
    }

    html,
    body,
    .login-pf,
    .login-pf body {
      min-height: 100%;
      background: var(--infernix-bg) !important;
      color: var(--infernix-ink);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .login-pf-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
      background: var(--infernix-bg) !important;
    }

    #kc-header {
      position: relative;
      z-index: 2;
      width: min(100%, 440px);
      margin: 0 auto 16px;
      color: var(--infernix-ink);
      text-align: center;
    }

    #kc-header-wrapper {
      color: var(--infernix-ink);
      font-size: 0;
      letter-spacing: 0;
      text-transform: none;
      line-height: 1.2;
    }

    #kc-header-wrapper::before {
      content: "Infernix";
      display: block;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    #kc-header-wrapper::after {
      content: "Durable-context inference console";
      display: block;
      margin-top: 0.35rem;
      color: var(--infernix-muted);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0;
    }

    .card-pf {
      position: relative;
      z-index: 3;
      width: min(100%, 440px);
      margin: 0 auto;
      background: var(--infernix-surface) !important;
      border: 1px solid var(--infernix-line);
      border-radius: 6px;
      color: var(--infernix-ink);
      box-shadow: 0 18px 45px rgba(23, 32, 42, 0.12);
      padding: 26px;
    }

    #kc-content,
    #kc-content-wrapper {
      position: relative;
      z-index: 3;
      width: auto;
      margin: 0;
      padding: 0;
      border: 0;
      color: var(--infernix-ink);
      background: transparent !important;
      box-shadow: none;
    }

    #kc-page-title {
      color: var(--infernix-ink);
      font-size: 1.35rem;
      letter-spacing: 0;
      line-height: 1.25;
      margin-bottom: 18px;
    }

    #kc-form,
    #kc-form-wrapper,
    #kc-register-form,
    #kc-info,
    #kc-info-wrapper {
      color: var(--infernix-ink);
      background: transparent !important;
    }

    #kc-info-wrapper {
      margin-top: 18px;
      border-top: 1px solid var(--infernix-line);
      padding-top: 16px;
    }

    .pf-v5-c-form__label,
    .pf-v5-c-form__label-text,
    .pf-c-form__label,
    .pf-c-form__label-text,
    .pf-v5-c-check__label,
    .pf-c-check__label,
    label,
    #kc-form-options,
    #kc-form-options label,
    #kc-registration,
    #kc-username,
    #kc-attempted-username,
    .instruction {
      color: var(--infernix-ink) !important;
    }

    .pf-v5-c-helper-text,
    .pf-c-form__helper-text,
    .helper-text,
    .subtitle,
    #kc-registration span,
    #kc-info-wrapper,
    #kc-locale,
    #kc-locale a,
    #kc-current-locale-link {
      color: var(--infernix-muted) !important;
    }

    .pf-v5-c-button.pf-m-primary,
    .pf-c-button.pf-m-primary,
    #kc-form-buttons input[type="submit"] {
      background: var(--infernix-accent);
      border-color: var(--infernix-accent);
      border-radius: 5px;
      color: #ffffff;
      font-weight: 700;
      min-height: 40px;
    }

    .pf-v5-c-button.pf-m-primary:hover,
    .pf-c-button.pf-m-primary:hover,
    #kc-form-buttons input[type="submit"]:hover {
      background: var(--infernix-accent-strong);
      border-color: var(--infernix-accent-strong);
    }

    #kc-registration a,
    #kc-form-options a,
    #kc-info-wrapper a,
    .login-pf a {
      color: var(--infernix-accent-strong);
      font-weight: 650;
    }

    .pf-v5-c-form-control,
    .pf-c-form-control,
    input[type="text"],
    input[type="password"],
    input[type="email"] {
      border-color: var(--infernix-line);
      border-radius: 5px;
      color: var(--infernix-ink) !important;
      background: #ffffff !important;
    }

    input::placeholder {
      color: var(--infernix-muted);
      opacity: 1;
    }

    input:focus,
    button:focus,
    a:focus {
      outline: 3px solid rgba(138, 91, 24, 0.35);
      outline-offset: 2px;
    }

    .pf-v5-c-alert.pf-m-danger,
    .pf-c-alert.pf-m-danger,
    #input-error,
    .kc-feedback-text,
    .pf-v5-c-helper-text.pf-m-error,
    .pf-c-form__helper-text.pf-m-error {
      color: var(--infernix-danger) !important;
      background: #fff7f7;
    }

    @media (max-width: 520px) {
      .login-pf-page {
        align-items: stretch;
        padding: 22px 14px;
      }

      .card-pf {
        width: 100%;
        padding: 22px 18px;
      }
    }
{{- end }}
