{{- if and .Values.demo.enabled .Values.keycloak.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.keycloak.admin.secretName }}
  namespace: platform
type: Opaque
stringData:
  # Phase 7 Sprint 7.1: bootstrap admin credentials for the local Keycloak
  # release. Operators rotate this through the standard Keycloak admin UI
  # after first login; the secret is consumed by the Deployment's
  # KC_BOOTSTRAP_ADMIN_USERNAME / KC_BOOTSTRAP_ADMIN_PASSWORD env vars on
  # first boot only. The realm import runs unprivileged through the
  # operator-managed Postgres user, not through this admin account.
  username: {{ .Values.keycloak.admin.user | quote }}
  password: "infernix-bootstrap-admin"
{{- end }}
