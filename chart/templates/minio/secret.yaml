{{/*
Phase 3 Sprint 3.11 (2026-05-29): MinIO root credentials Secret
consumed by the StatefulSet + the provisioning Job. Values come from
`service.minio.{accessKey,secretKey}` which the daemon already reads
as the operator-facing MinIO credentials surface. The platform's own
demo backend reads the same credentials from
`/etc/infernix/secrets/minio.json` (rendered by
`secret-cluster-secrets.yaml`).
*/}}
{{- if .Values.infernixMinio.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: infernix-minio-root
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-minio
    app.kubernetes.io/component: object-store
    app.kubernetes.io/part-of: infernix
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ .Values.service.minio.accessKey | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.service.minio.secretKey | quote }}
{{- end }}
