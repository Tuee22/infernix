{{/*
Phase 3 Sprint 3.11 (2026-05-29): hand-authored distributed MinIO
StatefulSet replaces the retired bitnami sub-chart.

- 4 replicas (preserves the prior bitnami chart's `statefulset.replicaCount: 4`).
- Image: upstream `minio/minio` (multi-arch arm64 + amd64). Pulled
  through Harbor by the publication path; `harborOverridesValue`
  overrides `image.repository` + `image.tag` to the Harbor-mirrored
  refs after `cluster up` publishes the upstream image.
- PVCs: per-pod `data-infernix-minio-<ordinal>` claims on
  `infernix-manual` storage. The lifecycle binder
  (`reconcilePersistentVolumes`) creates matching PVs at known
  host-side paths.
- `MINIO_ROOT_USER` + `MINIO_ROOT_PASSWORD` from the
  `infernix-minio-root` Secret.
- Distributed-mode CMD: `minio server` with one
  `http://infernix-minio-<ordinal>.infernix-minio-headless.platform.svc.cluster.local:9000/data`
  endpoint per replica. The pod-name DNS resolves through the
  headless Service.
- A busybox initContainer chmod-s `/data` to `0777` because the
  `infernix-manual` storage class hands the PV out with root
  ownership and the upstream MinIO process otherwise refuses to
  write.
*/}}
{{- if .Values.infernixMinio.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infernix-minio
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-minio
    app.kubernetes.io/component: object-store
    app.kubernetes.io/part-of: infernix
spec:
  serviceName: infernix-minio-headless
  replicas: {{ .Values.infernixMinio.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-minio
      app.kubernetes.io/component: object-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-minio
        app.kubernetes.io/component: object-store
        app.kubernetes.io/part-of: infernix
    spec:
      securityContext:
        runAsNonRoot: false
      initContainers:
        - name: prepare-data
          image: "{{ .Values.infernixMinio.initImage.repository }}:{{ .Values.infernixMinio.initImage.tag }}"
          imagePullPolicy: {{ .Values.infernixMinio.initImage.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /data
              chmod 0777 /data
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: minio
          image: "{{ .Values.infernixMinio.image.repository }}:{{ .Values.infernixMinio.image.tag }}"
          imagePullPolicy: {{ .Values.infernixMinio.image.pullPolicy }}
          command:
            - minio
          args:
            - server
            {{- range $i, $_ := until (int .Values.infernixMinio.replicaCount) }}
            - http://infernix-minio-{{ $i }}.infernix-minio-headless.platform.svc.cluster.local:9000/data
            {{- end }}
          envFrom:
            - secretRef:
                name: infernix-minio-root
          ports:
            - name: s3
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.infernixMinio.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.infernixMinio.persistence.size }}
{{- end }}
