{{/*
Phase 7 Sprint 7.17: cluster secrets manifest + companion credential
files.

The companion `dhall/InfernixSecrets.dhall` manifest names the file
*paths* at which credential material lives, not the credential values
themselves. This Secret materializes the manifest plus the matching
JSON credential files; the Haskell daemon decodes the manifest at
startup via `Infernix.SecretsConfig.decodeSecretsConfigFile` and
reads each referenced JSON file via `readMinioCredentials` and
friends.

Mount path inside coordinator / engine / demo pods:
`/etc/infernix/secrets/` (readOnly).

Keys:
  - `InfernixSecrets.dhall`  — the typed paths manifest
  - `minio.json`              — `{ "accessKey": ..., "secretKey": ... }`
  - `keycloak-admin.json`     — `{ "username": ..., "password": ... }`
  - `keycloak-db.json`        — `{ "username": ..., "password": ... }`

The `KC_DB_*` env contract on Keycloak's own pod template is the one
documented third-party exception per
`documents/architecture/configuration_doctrine.md`; the Keycloak
chart template mounts this Secret and maps the matching JSON file
into Keycloak's expected env names.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: infernix-cluster-secrets
  namespace: platform
  labels:
    app.kubernetes.io/name: infernix-cluster-secrets
    app.kubernetes.io/component: cluster-secrets
type: Opaque
stringData:
  # Phase 8 Sprint 8.4: the `InfernixSecrets.dhall` paths manifest is
  # rendered by the `infernix` binary and passed through
  # `.Values.clusterSecrets.manifest`; Helm only embeds the string. No
  # `let`/schema Dhall lives inside this template (`infernix lint chart`
  # rejects any). The credential JSON files below stay template-rendered
  # from the MinIO / Keycloak wiring values.
  InfernixSecrets.dhall: |
{{ .Values.clusterSecrets.manifest | nindent 4 }}
  minio.json: |
    {
      "accessKey": {{ .Values.service.minio.accessKey | quote }},
      "secretKey": {{ .Values.service.minio.secretKey | quote }}
    }
  keycloak-admin.json: |
    {
      "username": {{ default "admin" .Values.keycloak.admin.user | quote }},
      "password": "operator-managed"
    }
  keycloak-db.json: |
    {
      "username": "keycloak",
      "password": "operator-managed"
    }
