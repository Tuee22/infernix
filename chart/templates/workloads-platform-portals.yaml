apiVersion: apps/v1
kind: Deployment
metadata:
  name: infernix-harbor-gateway
  namespace: platform
spec:
  replicas: {{ .Values.platformPortals.harbor.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infernix-harbor-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infernix-harbor-gateway
    spec:
      containers:
        - name: infernix-harbor-gateway
          image: "{{ .Values.service.image.repository }}:{{ .Values.service.image.tag }}"
          imagePullPolicy: {{ .Values.service.image.pullPolicy }}
          command:
            - python3
          args:
            - tools/portal_surface.py
          env:
            - name: INFERNIX_BIND_HOST
              value: "0.0.0.0"
            - name: INFERNIX_PORT
              value: "8080"
            - name: INFERNIX_PORTAL_SURFACE
              value: harbor
            - name: INFERNIX_HARBOR_BACKEND_URL
              value: {{ .Values.platformPortals.harbor.backendUrl | quote }}
            - name: INFERNIX_HARBOR_API_URL
              value: {{ .Values.platformPortals.harbor.apiUrl | quote }}
            - name: INFERNIX_HARBOR_ADMIN_USER
              value: {{ .Values.platformPortals.harbor.adminUser | quote }}
            - name: INFERNIX_HARBOR_ADMIN_PASSWORD
              value: {{ .Values.harbor.harborAdminPassword | quote }}
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: infernix-harbor
  namespace: platform
spec:
  selector:
    app.kubernetes.io/name: infernix-harbor-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
