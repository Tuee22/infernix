runtimeMode: apple-silicon
controlPlaneContext: host-native

global:
  security:
    allowInsecureImages: true

upstreamCharts:
  harbor:
    enabled: true
  postgresOperator:
    enabled: true
  harborpg:
    enabled: true
  # Phase 7 Sprint 7.1: Patroni Postgres backing Keycloak. Gated on the
  # demo surface — production deploys (`demo_ui = false`) skip Keycloak
  # plus its database entirely.
  keycloakpg:
    enabled: true
  # Phase 3 Sprint 3.11 (2026-05-29): the upstream bitnami minio
  # sub-chart was retired in favor of the hand-authored MinIO
  # StatefulSet under `chart/templates/minio/`. The `infernixMinio:`
  # block at the bottom of this file is the supported MinIO
  # configuration surface.
  pulsar:
    enabled: true
  envoyGateway:
    enabled: true

gateway:
  publishedPort: 9090
  publishedNodePort: 30090
  listenerPort: 80

repoGateway:
  enabled: true

demoConfig:
  name: infernix-demo-config
  mountPath: /opt/build
  fileName: infernix-substrate.dhall
  catalogPayload: |
    {}

demo:
  enabled: true
  replicaCount: 2
  port: 8080
  image:
    repository: infernix-linux-cpu
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

publication:
  name: infernix-publication-state
  fileName: publication.json
  payloadJson: |
    {}

routes: []

operatorConsole:
  jwtGating:
    enabled: true
    cookieName: infernix_operator_token

# Phase 7 Sprint 7.7: shared backend wiring consumed by the supported
# three-role daemon split (coordinator + engine + demo). The legacy
# `service.{enabled,image,replicaCount,command,args,dataPvc}` keys are
# retired together with `chart/templates/deployment-service.yaml` and
# `chart/templates/persistentvolumeclaim-service-data.yaml`; what
# remains is the shared MinIO + Pulsar + engine-adapter env config the
# Deployment templates read.
service:
  minio:
    endpoint: http://infernix-minio.platform.svc.cluster.local:9000
    accessKey: minioadmin
    secretKey: minioadmin123
  pulsar:
    adminUrl: http://infernix-infernix-pulsar-proxy.platform.svc.cluster.local/admin/v2
    httpBaseUrl: http://infernix-infernix-pulsar-proxy.platform.svc.cluster.local
    webSocketBaseUrl: ws://infernix-infernix-pulsar-proxy.platform.svc.cluster.local/ws/v2
    serviceUrl: pulsar://infernix-infernix-pulsar-proxy.platform.svc.cluster.local:6650
    tenant: infernix
    namespace: demo
  engineAdapters:
    commandEnv: {}

# Phase 7 Sprint 7.7: the supported three-role daemon split is now the
# default cluster topology. `daemonSplit.enabled = true` activates the
# coordinator + engine + demo Deployment templates below. Current
# generated values keep the coordinator and engine roles enabled for
# production `demo_ui = false` deployments; only `demo.enabled` follows
# the demo UI flag.
daemonSplit:
  enabled: true

# Phase 4 Sprint 4.13: typed cluster-wiring values rendered into
# `ConfigMap/infernix-cluster-config` and consumed by every cluster-
# resident `infernix` daemon at startup. Mirrors the
# `dhall/InfernixCluster.dhall` schema; see
# `documents/engineering/cluster_config_manifest.md` for the full
# per-field origin mapping.
#
# Credentials are NOT here. They live in `Secret/infernix-cluster-secrets`
# (Phase 7 Sprint 7.17 materializes that companion template).
clusterConfig:
  name: infernix-cluster-config
  mountPath: /opt/infernix/cluster.dhall
  pulsar:
    systemNamespace: system
  minio:
    region: us-east-1
    presignExpirySeconds: 900
    modelsBucket: infernix-models
    demoArtifactsBucket: infernix-demo-objects
  keycloak:
    baseUrl: http://127.0.0.1/auth
    realmName: infernix
    clientId: infernix-spa
    jwksUrl: http://infernix-keycloak.platform.svc.cluster.local:8080/auth/realms/infernix/protocol/openid-connect/certs
  demoBackend:
    bindHost: 0.0.0.0
    port: 8080
    bridgeMode: pulsar
  engine:
    modelCacheRoot: /model-cache
    # Sized to match the engine deployment's `modelCache.sizeLimit`
    # (64 GiB) so the adapter-side LRU eviction stays under kubelet's
    # ephemeral-storage threshold. 64 GiB headroom is required because the
    # diffusers engine caches large diffusers-format repos (Wan2.1-T2V-1.3B
    # ships the multi-GB umt5-xxl text encoder) alongside SDXL in one engine
    # cache; 32 GiB evicted the diffusers pod mid-bootstrap on linux-gpu.
    modelCacheQuotaBytes: 68719476736
  coordinator:
    catalogSource: mounted-configmap
    daemonLocation: cluster-pod

coordinator:
  enabled: true
  replicaCount: 2
  image:
    repository: infernix-linux-cpu
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  command:
    - infernix
  # The Deployment template passes the typed `--role coordinator` CLI flag.
  # The retired `INFERNIX_DAEMON_ROLE` env path must not reappear.
  args:
    - service
  podDisruptionBudget:
    maxUnavailable: 1

engine:
  enabled: true
  # Operator-set up to the number of engine-capable nodes. Default 1 keeps
  # the chart shape sensible on single-node Kind clusters; the supported
  # production target raises this to match available GPU capacity on
  # `linux-gpu`.
  replicaCount: 1
  image:
    repository: infernix-linux-cpu
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  perEngine:
    enabled: false
    replicaCount: 0
    names: []
    images: {}
  command:
    - infernix
  args:
    - service
  modelCache:
    # `emptyDir` sizeLimit on the engine pod's `/model-cache` volume. The
    # adapter-side LRU eviction keeps the actual on-disk size under this
    # ceiling so kubelet never restarts the pod for ephemeral-storage
    # exhaustion. 64Gi accommodates the diffusers engine caching large
    # diffusers-format repos (e.g. Wan2.1-T2V-1.3B with the umt5-xxl text
    # encoder) alongside SDXL; 32Gi caused mid-bootstrap eviction on linux-gpu.
    sizeLimit: 64Gi
  podDisruptionBudget:
    maxUnavailable: 1

demoSplit:
  enabled: true
  replicaCount: 2
  podDisruptionBudget:
    maxUnavailable: 1

# Phase 3 Sprint 3.11 (2026-05-29): the hand-authored MinIO
# StatefulSet under `chart/templates/minio/` replaces the retired
# `bitnami/minio` v17.0.21 sub-chart. Bitnami moved free multi-arch
# images to `bitnamilegacy/*` (frozen amd64-only) in late 2025, and the
# upstream `minio/minio` image is not a drop-in replacement under the
# bitnami chart wrapper (the chart invokes the image with no args while
# the upstream image expects `minio server <path>` as CMD). Hand-
# authored templates give the platform full control over the StatefulSet
# CMD, distributed-mode endpoints, root credentials, and provisioning
# Job — no Bitnami licensing exposure ever again.
infernixMinio:
  enabled: true
  replicaCount: 4
  image:
    repository: docker.io/minio/minio
    tag: "RELEASE.2025-09-07T16-13-09Z"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 384Mi
  clientImage:
    repository: docker.io/minio/mc
    tag: "RELEASE.2025-08-13T08-35-41Z"
    pullPolicy: IfNotPresent
  initImage:
    repository: docker.io/busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
  service:
    nodePort: 30011
  persistence:
    storageClass: infernix-manual
    # The linux-gpu full catalog retains large lazy-bootstrap model bundles
    # (Wan2.1 T2V plus SDXL and quantized LLM/audio rows) in `infernix-models`.
    # Keep each distributed MinIO drive above the complete retained model set so
    # later rows can publish without tripping MinIO's low-free-space guard.
    size: 64Gi
  buckets:
    - harbor-registry
    # Phase 7 Sprint 7.7: always-on platform model-weights bucket. The
    # coordinator role's bootstrap subscription PUTs `<modelId>/<filename>`
    # entries here on first use of a model and writes the `.ready` sentinel
    # last; engines read from this bucket via the per-adapter model cache.
    - infernix-models
    # Phase 4 Sprint 4.18: always-on immutable engine software payload
    # bucket. Stores content-addressed wheelhouses, native binaries, Core ML
    # compiled models, JVM tools, and reusable materialization payloads.
    - infernix-engine-artifacts
    # Phase 7 Sprint 7.7: demo-gated user-artifact bucket. Hosts per-user
    # prefixes `users/<userId>/contexts/<contextId>/{uploads,generated}/`
    # for the durable-context surface; presigned PUT/GET URLs minted at
    # `/api/objects` are scoped per user.
    - infernix-demo-objects

harbor:
  expose:
    type: nodePort
    tls:
      enabled: false
      certSource: none
    nodePort:
      name: harbor
      ports:
        http:
          port: 80
          nodePort: 30002
  externalURL: http://localhost:30002
  harborAdminPassword: Harbor12345
  # Pin Harbor's internal secrets so bootstrap and final phases render the same Harbor resources.
  secretKey: "0123456789abcdef"
  database:
    type: external
    external:
      host: harbor-postgresql-pgbouncer.platform.svc.cluster.local
      port: "5432"
      username: harbor
      existingSecret: infernix-harbor-db-user
      coreDatabase: registry
      sslmode: require
  persistence:
    enabled: true
    resourcePolicy: keep
    persistentVolumeClaim:
