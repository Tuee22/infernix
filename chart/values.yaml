runtimeMode: apple-silicon
controlPlaneContext: host-native

global:
  security:
    allowInsecureImages: true

upstreamCharts:
  harbor:
    enabled: true
  postgresOperator:
    enabled: true
  harborpg:
    enabled: true
  minio:
    enabled: true
  pulsar:
    enabled: true
  envoyGateway:
    enabled: true

gateway:
  publishedPort: 9090
  publishedNodePort: 30090
  listenerPort: 80

repoGateway:
  enabled: true

demoConfig:
  name: infernix-demo-config
  mountPath: /opt/build
  fileName: infernix-substrate.dhall
  catalogPayload: |
    {}

demo:
  enabled: true
  replicaCount: 1
  port: 8080
  image:
    repository: infernix-linux-cpu
    tag: local
    pullPolicy: IfNotPresent

publication:
  name: infernix-publication-state
  fileName: publication.json
  payloadJson: |
    {}

routes: []

service:
  image:
    repository: infernix-linux-cpu
    tag: local
    pullPolicy: IfNotPresent
  replicaCount: 1
  command:
    - infernix
  args:
    - service
  dataPvc:
    name: infernix-service-0-data
    size: 5Gi
    storageClassName: infernix-manual
  minio:
    endpoint: http://infernix-minio.platform.svc.cluster.local:9000
    accessKey: minioadmin
    secretKey: minioadmin123
    runtimeBucket: infernix-runtime
    resultsBucket: infernix-results
  pulsar:
    adminUrl: http://infernix-infernix-pulsar-proxy.platform.svc.cluster.local/admin/v2
    httpBaseUrl: http://infernix-infernix-pulsar-proxy.platform.svc.cluster.local
    webSocketBaseUrl: ws://infernix-infernix-pulsar-proxy.platform.svc.cluster.local/ws/v2
    serviceUrl: pulsar://infernix-infernix-pulsar-proxy.platform.svc.cluster.local:6650
    tenant: public
    namespace: default
  engineAdapters:
    commandEnv: {}

minio:
  mode: distributed
  fullnameOverride: infernix-minio
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
  clientImage:
    registry: docker.io
    repository: bitnamilegacy/minio-client
  defaultInitContainers:
    volumePermissions:
      image:
        registry: docker.io
        repository: bitnamilegacy/os-shell
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin123
  service:
    type: NodePort
    nodePorts:
      api: "30011"
  persistence:
    storageClass: infernix-manual
    size: 20Gi
  statefulset:
    replicaCount: 4
    zones: 1
    drivesPerNode: 1
  console:
    enabled: true
    replicaCount: 1
    image:
      registry: docker.io
      repository: bitnamilegacy/minio-object-browser
    service:
      type: ClusterIP
    ingress:
      enabled: false
  provisioning:
    enabled: true
    buckets:
      - name: harbor-registry
        versioning: Unchanged
      - name: infernix-runtime
        versioning: Unchanged
      - name: infernix-results
        versioning: Unchanged

harbor:
  expose:
    type: nodePort
    tls:
      enabled: false
      certSource: none
    nodePort:
      name: harbor
      ports:
        http:
          port: 80
          nodePort: 30002
  externalURL: http://localhost:30002
  harborAdminPassword: Harbor12345
  # Pin Harbor's internal secrets so bootstrap and final phases render the same Harbor resources.
  secretKey: "0123456789abcdef"
  database:
    type: external
    external:
      host: harbor-postgresql-pgbouncer.platform.svc.cluster.local
      port: "5432"
      username: harbor
      existingSecret: infernix-harbor-db-user
      coreDatabase: registry
      sslmode: require
  persistence:
    enabled: true
    resourcePolicy: keep
    persistentVolumeClaim:
      registry:
        storageClass: infernix-manual
        size: 5Gi
      jobservice:
        jobLog:
          storageClass: infernix-manual
          size: 1Gi
      redis:
        storageClass: infernix-manual
        size: 1Gi
      trivy:
        storageClass: infernix-manual
        size: 5Gi
    imageChartStorage:
      type: s3
      disableredirect: true
      s3:
        region: us-east-1
        bucket: harbor-registry
        regionendpoint: http://infernix-minio.platform.svc.cluster.local:9000
        accesskey: minioadmin
        secretkey: minioadmin123
        secure: false
        v4auth: true
        chunksize: "134217728"
        multipartcopychunksize: "134217728"
        multipartcopymaxconcurrency: 4
        multipartcopythresholdsize: "134217728"
