  fullnameOverride: infernix-postgres-operator
  image: docker.io/percona/percona-postgresql-operator:2.9.0
  imagePullPolicy: IfNotPresent

harborpg:
  fullnameOverride: harbor-postgresql
  image: docker.io/percona/percona-distribution-postgresql:18.3-1
  imagePullPolicy: IfNotPresent
  postgresVersion: 18
  users:
    - name: harbor
      databases:
        - registry
      password:
        type: ASCII
      secretName: infernix-harbor-db-user
  databaseInitSQL:
    key: init.sql
    name: harbor-postgresql-init-sql
  instances:
    - name: instance1
      replicas: 3
      resources:
        requests:
          cpu: 75m
          memory: 160Mi
        limits:
          cpu: 500m
          memory: 384Mi
