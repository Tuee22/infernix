  trivy:
    replicas: 3

postgresOperator:
  fullnameOverride: infernix-postgres-operator
  image: docker.io/percona/percona-postgresql-operator:2.9.0
  imagePullPolicy: IfNotPresent

harborpg:
  fullnameOverride: harbor-postgresql
  image: docker.io/percona/percona-distribution-postgresql:18.3-1
  imagePullPolicy: IfNotPresent
  postgresVersion: 18
  users:
    - name: harbor
      databases:
        - registry
      password:
        type: ASCII
      secretName: infernix-harbor-db-user
  instances:
    - name: instance1
      replicas: 3
      dataVolumeClaimSpec:
        storageClassName: infernix-manual
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
  proxy:
    pgBouncer:
      replicas: 3
      image: docker.io/percona/percona-pgbouncer:1.25.1-1
  backups:
    enabled: true
    pgbackrest:
      image: docker.io/percona/percona-pgbackrest:2.58.0-1
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              storageClassName: infernix-manual
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi

pulsar:
  # Pulsar is only enabled in the final Helm phase, so force the upstream init jobs to run there.
  initialize: true
  nameOverride: infernix-pulsar
  components:
    zookeeper: true
    bookkeeper: true
    autorecovery: true
    broker: true
    proxy: true
    toolset: true
    pulsar_manager: false
    functions: false
    oxia: false
  affinity:
    anti_affinity: false
    type: preferredDuringSchedulingIgnoredDuringExecution
  zookeeper:
    replicaCount: 3
    podMonitor:
      enabled: false
    affinity:
      anti_affinity: false
    volumes:
      data:
        storageClassName: infernix-manual
        size: 5Gi
  bookkeeper:
    replicaCount: 3
    podMonitor:
      enabled: false
    affinity:
      anti_affinity: false
    volumes:
      journal:
        storageClassName: infernix-manual
        size: 5Gi
      ledgers:
        storageClassName: infernix-manual
        size: 5Gi
  broker:
    replicaCount: 3
    podMonitor:
      enabled: false
    affinity:
      anti_affinity: false
  proxy:
    replicaCount: 3
    configData:
      webSocketServiceEnabled: "true"
    podMonitor:
      enabled: false
    affinity:
      anti_affinity: false
    service:
      type: NodePort
      nodePorts:
        http: "30080"
        pulsar: "30650"
  autorecovery:
    replicaCount: 3
    podMonitor:
      enabled: false
