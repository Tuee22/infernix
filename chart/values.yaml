    pgbackrest:
      image: docker.io/percona/percona-pgbackrest:2.58.0-1
      containers:
        pgbackrest:
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 100m
              memory: 192Mi
        pgbackrestConfig:
          resources:
            requests:
              cpu: 15m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      jobs:
        resources:
          requests:
            cpu: 25m
            memory: 96Mi
          limits:
            cpu: 100m
            memory: 192Mi
      repoHost:
        resources:
          requests:
            cpu: 25m
            memory: 96Mi
          limits:
            cpu: 100m
            memory: 192Mi
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              storageClassName: infernix-manual
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi

# Phase 7 Sprint 7.1: Patroni Postgres backing Keycloak. Mirrors the Harbor
# pattern: dedicated Patroni cluster managed by the same Percona operator,
# with the `keycloak` role + database created by the operator and the
# generated credentials exposed via `infernix-keycloak-db-user` for the
# Keycloak Deployment to consume.
keycloakpg:
  fullnameOverride: keycloak-postgresql
  image: docker.io/percona/percona-distribution-postgresql:18.3-1
  imagePullPolicy: IfNotPresent
  postgresVersion: 18
  users:
    - name: keycloak
      databases:
        - keycloak
      password:
        type: ASCII
      secretName: infernix-keycloak-db-user
  databaseInitSQL:
    key: init.sql
    name: keycloak-postgresql-init-sql
  instances:
    - name: instance1
      replicas: 3
      resources:
        requests:
          cpu: 75m
          memory: 160Mi
        limits:
          cpu: 500m
          memory: 384Mi
      dataVolumeClaimSpec:
        storageClassName: infernix-manual
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
  proxy:
    pgBouncer:
      replicas: 3
      image: docker.io/percona/percona-pgbouncer:1.25.1-1
      resources:
        requests:
          cpu: 25m
          memory: 48Mi
        limits:
          cpu: 100m
          memory: 96Mi
  backups:
    enabled: true
    pgbackrest:
      image: docker.io/percona/percona-pgbackrest:2.58.0-1
      containers:
        pgbackrest:
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 100m
              memory: 192Mi
        pgbackrestConfig:
          resources:
            requests:
              cpu: 15m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      jobs:
        resources:
          requests:
            cpu: 25m
            memory: 96Mi
          limits:
            cpu: 100m
            memory: 192Mi
      repoHost:
        resources:
          requests:
            cpu: 25m
            memory: 96Mi
          limits:
            cpu: 100m
            memory: 192Mi
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              storageClassName: infernix-manual
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 2Gi

# Phase 7 Sprint 7.1: Keycloak release. Self-signup on, email
# verification off; the realm definition lives in
# `chart/templates/keycloak/configmap-realm-import.yaml` and is mounted
# read-only at `/opt/keycloak/data/import/`. Demo-gated; absent when
# `demo.enabled = false`.
keycloak:
  enabled: true
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0.7"
    pullPolicy: IfNotPresent
  javaOptsHeap: "-XX:InitialRAMPercentage=10 -XX:MaxRAMPercentage=50"
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      memory: 768Mi
  # The local demo runs one Keycloak application pod until Sprint 7.14
  # validates cookie-aware `/auth` proxy affinity or clustered embedded
  # cache behavior through Envoy Gateway. The backing Patroni Postgres
  # cluster remains HA.
  replicaCount: 1
  # Phase 7 Sprint 7.14: operator-facing base URL the demo backend
  # expects the issuer claim to match. Cluster materialization overrides
  # this with the active edge URL and Keycloak uses that full URL
  # strictly, so browser form actions and OIDC redirects preserve the
  # local edge host and port instead of re-deriving them from forwarded
  # headers. Operators with a different routing topology should override
  # this to match the routed issuer, e.g. @https://infernix.example.com/auth@.
  externalBaseUrl: http://127.0.0.1/auth
  theme:
    name: infernix
  realm:
    name: infernix
    displayName: Infernix Demo
    clientId: infernix-spa
    spaClientId: infernix-spa
    issuerUrl: /auth/realms/infernix
  admin:
    user: admin
    secretName: infernix-keycloak-admin
  database:
    secretName: infernix-keycloak-db-user
    host: keycloak-postgresql-pgbouncer.platform.svc.cluster.local
    port: 5432
    dbName: keycloak
  service:
    port: 8080

pulsar:
  # Pulsar is only enabled in the final Helm phase, so force the upstream init jobs to run there.
  initialize: true
  nameOverride: infernix-pulsar
  components:
    zookeeper: true
    bookkeeper: true
    autorecovery: true
    broker: true
    proxy: true
    toolset: true
    pulsar_manager: false
    functions: false
    oxia: false
  affinity:
    anti_affinity: false
    type: preferredDuringSchedulingIgnoredDuringExecution
  zookeeper:
    replicaCount: 3
    podMonitor:
      enabled: false
    affinity:
      anti_affinity: false
    resources:
      requests:
        memory: 128Mi
        cpu: 0.05
      limits:
        memory: 256Mi
    volumes:
      data:
        storageClassName: infernix-manual
        size: 5Gi
  bookkeeper:
    metadata:
      resources:
        requests:
          memory: 128Mi
          cpu: 0.05
        limits:
          memory: 256Mi
    replicaCount: 3
    podMonitor:
      enabled: false
    affinity:
      anti_affinity: false
    resources:
      requests:
        memory: 256Mi
        cpu: 0.1
      limits:
        memory: 512Mi
    configData:
      # Local host-path PVs share the developer's backing filesystem. Favor
      # absolute remaining space over the upstream default 95% utilization cap
      # so repeat cluster down/up cycles still recover on very full developer
      # hosts while a small amount of writable space still remains.
      diskUsageLwmThreshold: "0.999"
      diskUsageWarnThreshold: "0.9995"
      diskUsageThreshold: "0.9999"
    volumes:
      journal:
        storageClassName: infernix-manual
        size: 5Gi
      ledgers:
        storageClassName: infernix-manual
        size: 5Gi
  pulsar_metadata:
    resources:
      requests:
        memory: 128Mi
        cpu: 0.05
      limits:
        memory: 256Mi
  broker:
    replicaCount: 3
    podMonitor:
      enabled: false
    affinity:
      anti_affinity: false
    resources:
      requests:
        memory: 256Mi
        cpu: 0.1
      limits:
        memory: 512Mi
    configData:
      # Required before namespace/topic-level producer dedup policies take effect.
      brokerDeduplicationEnabled: "true"
  proxy:
    replicaCount: 3
    configData:
      webSocketServiceEnabled: "true"
    podMonitor:
      enabled: false
    affinity:
      anti_affinity: false
    resources:
      requests:
        memory: 192Mi
        cpu: 0.1
      limits:
        memory: 512Mi
    service:
      type: NodePort
      nodePorts:
        http: "30080"
        pulsar: "30650"
  autorecovery:
    replicaCount: 3
    podMonitor:
      enabled: false
    configData:
      BOOKIE_MEM: "-Xms64m -Xmx256m -XX:MaxDirectMemorySize=128m"
    resources:
      requests:
        memory: 192Mi
        cpu: 0.05
      limits:
        memory: 512Mi
  toolset:
    resources:
      requests:
        memory: 128Mi
        cpu: 0.05
      limits:
        memory: 256Mi
