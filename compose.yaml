services:
  infernix:
    image: infernix-linux-cpu:local
    build:
      context: .
      dockerfile: docker/linux-substrate.Dockerfile
      args:
        RUNTIME_MODE: linux-cpu
        BASE_IMAGE: ubuntu:24.04
    command: ["infernix", "--help"]
    environment:
      INFERNIX_BUILD_ROOT: /opt/build/infernix
      INFERNIX_CABAL_BUILDDIR: /opt/build/infernix/cabal
    volumes:
      - ./.data:/workspace/.data
      - infernix-build:/opt/build
      - infernix-cabal-home:/root/.cabal
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace

volumes:
  infernix-build:
  infernix-cabal-home:
