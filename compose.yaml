services:
  infernix:
    image: "${INFERNIX_COMPOSE_IMAGE:-infernix-linux-cpu:local}"
    build:
      context: .
      dockerfile: docker/linux-substrate.Dockerfile
      args:
        RUNTIME_MODE: "${INFERNIX_COMPOSE_SUBSTRATE:-linux-cpu}"
        DEMO_UI: "${INFERNIX_COMPOSE_DEMO_UI:-true}"
        BASE_IMAGE: "${INFERNIX_COMPOSE_BASE_IMAGE:-ubuntu:24.04}"
    command: ["infernix", "--help"]
    environment:
      INFERNIX_BUILD_ROOT: /opt/build/infernix
      INFERNIX_CABAL_BUILDDIR: /opt/build/infernix/cabal
    volumes:
      - ./.data:/workspace/.data
      - infernix-build:/opt/build
      - infernix-cabal-home:/root/.cabal
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace

volumes:
  infernix-build:
  infernix-cabal-home:
