services:
  infernix:
    image: "${INFERNIX_COMPOSE_IMAGE:-infernix-linux-cpu:local}"
    build:
      context: .
      dockerfile: docker/linux-substrate.Dockerfile
      args:
        RUNTIME_MODE: "${INFERNIX_COMPOSE_SUBSTRATE:-linux-cpu}"
        DEMO_UI: "${INFERNIX_COMPOSE_DEMO_UI:-true}"
        BASE_IMAGE: "${INFERNIX_COMPOSE_BASE_IMAGE:-ubuntu:24.04}"
    command: ["infernix", "--help"]
    environment:
      INFERNIX_BUILD_ROOT: /workspace/.build/outer-container/build
      INFERNIX_HOST_REPO_ROOT: "${INFERNIX_HOST_REPO_ROOT:-${PWD}}"
    volumes:
      - ./.data:/workspace/.data
      - ./.build:/workspace/.build
      - ./chart/charts:/workspace/chart/charts
      - ./compose.yaml:/workspace/compose.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace

  playwright:
    image: infernix-playwright:local
    build:
      context: .
      dockerfile: docker/playwright.Dockerfile
    network_mode: "${INFERNIX_PLAYWRIGHT_NETWORK:-bridge}"
    environment:
      INFERNIX_EDGE_PORT: "${INFERNIX_EDGE_PORT:-30090}"
      INFERNIX_PLAYWRIGHT_HOST: "${INFERNIX_PLAYWRIGHT_HOST:-host.docker.internal}"
      INFERNIX_EXPECT_DAEMON_LOCATION: "${INFERNIX_EXPECT_DAEMON_LOCATION:-cluster}"
      INFERNIX_EXPECT_INFERENCE_DISPATCH_MODE: "${INFERNIX_EXPECT_INFERENCE_DISPATCH_MODE:-pulsar-bridge-to-cluster-daemon}"
      INFERNIX_EXPECT_API_UPSTREAM_MODE: "${INFERNIX_EXPECT_API_UPSTREAM_MODE:-cluster-demo}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${INFERNIX_HOST_REPO_ROOT:-.}/web/playwright:/workspace/web/playwright:ro"
      - "${INFERNIX_HOST_REPO_ROOT:-.}/.data:/workspace/.data"
    working_dir: /workspace
