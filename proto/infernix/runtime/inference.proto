syntax = "proto3";

package infernix.runtime;

message RequestField {
  string name = 1;
  string label = 2;
  string field_type = 3;
}

message CatalogEntry {
  string matrix_row_id = 1;
  string model_id = 2;
  string display_name = 3;
  string family = 4;
  string description = 5;
  string artifact_type = 6;
  string reference_model = 7;
  string download_url = 8;
  string selected_engine = 9;
  repeated RequestField request_shape = 10;
  string runtime_mode = 11;
  string runtime_lane = 12;
  bool requires_gpu = 13;
  string notes = 14;
}

message EngineBinding {
  string engine = 1;
  string adapter_id = 2;
  string adapter_type = 3;
  string adapter_locator = 4;
  bool python_native = 5;
}

message GeneratedCatalog {
  string runtime_mode = 1;
  int32 edge_port = 2;
  string config_map_name = 3;
  string generated_path = 4;
  string mounted_path = 5;
  repeated CatalogEntry models = 6;
  bool demo_ui = 7;
  repeated string request_topics = 8;
  string result_topic = 9;
  repeated EngineBinding engines = 10;
}

message InferenceRequest {
  string request_id = 1;
  string request_model_id = 2;
  string input_text = 3;
  string runtime_mode = 4;
  // Phase 7 Sprint 7.8: typed envelope fields for the durable-context
  // dispatcher. user_id + context_id address the engine's result writeback
  // and per-user MinIO scoping. user_prompt_message_id is the conversation-
  // log MessageId that both producer-side dedup (on inference.request.<mode>)
  // and causal reference (carried through on inference.result.<mode>) use.
  // conversation_log_offset + prefix_hash let the engine verify KV cache
  // consistency before reuse; on hash mismatch it rebuilds from the log.
  string user_id = 5;
  string context_id = 6;
  string user_prompt_message_id = 7;
  string client_idempotency_key = 8;
  int64 conversation_log_offset = 9;
  string prefix_hash = 10;
  string causal_ref = 11;
  // Phase 4 Sprint 4.15: non-text input for the audio and image input
  // families (speech, source separation, audio-to-MIDI, music
  // transcription, OMR). Carries an infernix-demo-objects object
  // reference (bucket/key) the engine adapter reads instead of
  // input_text; text families leave it empty and use input_text.
  string input_object_ref = 12;
}

message WorkerRequest {
  string request_model_id = 1;
  string input_text = 2;
  string runtime_mode = 3;
  string selected_engine = 4;
  string adapter_id = 5;
  string engine_install_root = 6;
  // Phase 7 Sprint 7.7: model metadata used to be loaded by adapters
  // from synthetic JSON files staged under ./.data/object-store/; the
  // supported target reads it straight off the wire from the daemon's
  // already-loaded substrate .dhall catalog and pulls actual weights
  // from MinIO infernix-models via adapters/model_cache.get_model_path.
  string display_name = 7;
  string family = 8;
  string artifact_type = 9;
  string runtime_lane = 10;
  // Phase 4 Sprint 4.15: non-text input object reference handed to the
  // adapter for the audio and image input families. Empty for text
  // families, which use input_text.
  string input_object_ref = 11;
  // Phase 7 Sprint 7.7 / Phase 4 real-engine follow-on: typed cache
  // and MinIO wiring decoded by the Haskell engine daemon from the
  // mounted ClusterConfig + SecretsConfig and passed over the private
  // worker stdin boundary. Python adapters call adapters.model_cache.configure()
  // from these fields before get_model_path() or object upload/download.
  string model_cache_root = 12;
  uint64 model_cache_quota_bytes = 13;
  string minio_endpoint = 14;
  string minio_models_bucket = 15;
  string minio_demo_artifacts_bucket = 16;
  string minio_region = 17;
  string minio_access_key = 18;
  string minio_secret_key = 19;
  // Phase 7 Sprint 7.28: Haskell-derived object-key prefix for generated
  // artifact uploads. Artifact adapters and native-runner upload paths must
  // write under this prefix and fail closed when it is absent or invalid.
  string generated_output_object_prefix = 20;
}

message WorkerResponse {
  string output_text = 1;
  string error_code = 2;
  string error_message = 3;
  // Phase 4 Sprint 4.15: artifact families (source separation,
  // audio-to-MIDI, music transcription, image, video, audio generation,
  // OMR) write their generated bytes to the infernix-demo-objects MinIO
  // bucket and return the object reference (bucket/key) here. Text
  // families (LLM, speech transcription) leave it empty and use
  // output_text.
  string object_ref = 4;
}

message ResultPayload {
  oneof output {
    string inline_output = 1;
    string object_ref = 2;
    InferenceError inference_error = 3;
  }
}

message InferenceError {
  oneof error {
    ModelMemoryLimitExceeded model_memory_limit_exceeded = 1;
  }
}

message ModelMemoryLimitExceeded {
  string model_id = 1;
  int32 required_mib = 2;
  int32 available_mib = 3;
  string resource = 4;
  string source = 5;
}

message InferenceResult {
  string request_id = 1;
  string result_model_id = 2;
  string matrix_row_id = 3;
  string runtime_mode = 4;
  string selected_engine = 5;
  // Supported status values: "Completed", "Failed", "Cancelled" (Phase 7
  // Sprint 7.8 adds Cancelled). Engine emits Cancelled when the bridge
  // observes a ConversationCancelEvent in the conversation log before the
  // inference completes.
  string status = 6;
  ResultPayload payload = 7;
  string created_at = 8;
  // Phase 7 Sprint 7.8: causal reference back to the user prompt message id
  // that this result resolves. Used by the result-bridge to write a
  // ConversationInferenceResultEvent back to the per-context conversation
  // topic; producer-side dedup on the inference.result.<mode> topic is keyed
  // by this value.
  string causal_ref = 9;
  // Phase 7 Sprint 7.8: per-context routing for the result-bridge. The
  // bridge consumes inference.result.<mode> with a Failover subscription
  // and writes a ConversationInferenceResultEvent to the per-context
  // conversation topic; user_id + context_id are the fields the bridge
  // uses to compute the destination topic name without consulting a
  // separate request-id cache.
  string user_id = 10;
  string context_id = 11;
}

message ErrorResponse {
  string error_code = 1;
  string message = 2;
}
