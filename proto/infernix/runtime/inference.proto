syntax = "proto3";

package infernix.runtime;

message RequestField {
  string name = 1;
  string label = 2;
  string field_type = 3;
}

message CatalogEntry {
  string matrix_row_id = 1;
  string model_id = 2;
  string display_name = 3;
  string family = 4;
  string description = 5;
  string artifact_type = 6;
  string reference_model = 7;
  string download_url = 8;
  string selected_engine = 9;
  repeated RequestField request_shape = 10;
  string runtime_mode = 11;
  string runtime_lane = 12;
  bool requires_gpu = 13;
  string notes = 14;
}

message EngineBinding {
  string engine = 1;
  string adapter_id = 2;
  string adapter_type = 3;
  string adapter_locator = 4;
  bool python_native = 5;
}

message GeneratedCatalog {
  string runtime_mode = 1;
  int32 edge_port = 2;
  string config_map_name = 3;
  string generated_path = 4;
  string mounted_path = 5;
  repeated CatalogEntry models = 6;
  bool demo_ui = 7;
  repeated string request_topics = 8;
  string result_topic = 9;
  repeated EngineBinding engines = 10;
}

message InferenceRequest {
  string request_id = 1;
  string request_model_id = 2;
  string input_text = 3;
  string runtime_mode = 4;
  // Phase 7 Sprint 7.8: typed envelope fields for the durable-context
  // dispatcher. user_id + context_id address the engine's result writeback
  // and per-user MinIO scoping. user_prompt_message_id is the conversation-
  // log MessageId that both producer-side dedup (on inference.request.<mode>)
  // and causal reference (carried through on inference.result.<mode>) use.
  // conversation_log_offset + prefix_hash let the engine verify KV cache
  // consistency before reuse; on hash mismatch it rebuilds from the log.
  string user_id = 5;
  string context_id = 6;
  string user_prompt_message_id = 7;
  string client_idempotency_key = 8;
  int64 conversation_log_offset = 9;
  string prefix_hash = 10;
  string causal_ref = 11;
}

message WorkerRequest {
  string request_model_id = 1;
  string input_text = 2;
  string runtime_mode = 3;
  string selected_engine = 4;
  string adapter_id = 5;
  string artifact_bundle_path = 6;
  string source_manifest_path = 7;
  string cache_manifest_path = 8;
  string engine_install_root = 9;
}

message WorkerResponse {
  string output_text = 1;
  string error_code = 2;
  string error_message = 3;
}

message ResultPayload {
  oneof output {
    string inline_output = 1;
    string object_ref = 2;
  }
}

message InferenceResult {
  string request_id = 1;
  string result_model_id = 2;
  string matrix_row_id = 3;
  string runtime_mode = 4;
  string selected_engine = 5;
  // Supported status values: "Completed", "Failed", "Cancelled" (Phase 7
  // Sprint 7.8 adds Cancelled). Engine emits Cancelled when the bridge
  // observes a ConversationCancelEvent in the conversation log before the
  // inference completes.
  string status = 6;
  ResultPayload payload = 7;
  string created_at = 8;
  // Phase 7 Sprint 7.8: causal reference back to the user prompt message id
  // that this result resolves. Used by the result-bridge to write a
  // ConversationInferenceResultEvent back to the per-context conversation
  // topic; producer-side dedup on the inference.result.<mode> topic is keyed
  // by this value.
  string causal_ref = 9;
}

message ErrorResponse {
  string error_code = 1;
  string message = 2;
}
