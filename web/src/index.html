<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Infernix</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3f6;
        --surface: #ffffff;
        --surface-alt: #f6f9fa;
        --ink: #142027;
        --muted: #536670;
        --line: #cdd8dd;
        --accent: #176b87;
        --accent-strong: #0c4e63;
        --accent-soft: #e7f3f7;
        --focus: #8a5b18;
        --danger: #a43b3b;
        --ready: #1f7a4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button,
      select {
        min-height: 36px;
      }

      button:not(:disabled),
      select,
      a {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.7;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      a:focus-visible {
        outline: 3px solid rgba(138, 91, 24, 0.35);
        outline-offset: 2px;
      }

      a {
        color: inherit;
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      body.auth-signed-out .app-shell,
      body.auth-unknown .app-shell {
        display: none;
      }

      body.auth-signed-in .app-landing {
        display: none;
      }

      body.auth-unknown .app-landing {
        display: none;
      }

      .app-landing {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 20px;
        background: var(--bg);
      }

      .app-landing-card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 440px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 32px 28px;
        display: grid;
        gap: 16px;
        text-align: center;
        box-shadow: 0 18px 48px rgba(20, 32, 39, 0.13);
      }

      .app-landing-card h1 {
        font-size: 1.7rem;
      }

      .app-landing-subtitle {
        color: var(--muted);
        font-size: 0.95rem;
        margin: 0;
      }

      .app-landing-actions {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }

      .app-landing-actions .app-action-button {
        justify-content: center;
        text-align: center;
      }

      .app-header {
        position: relative;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
        box-shadow: 0 1px 0 rgba(20, 32, 39, 0.04);
      }

      .app-header-inner {
        display: grid;
        gap: 14px;
        max-width: 1480px;
        margin: 0 auto;
        padding: 16px 20px;
      }

      .app-title-row {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .app-actions {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      h1 {
        margin: 0;
        font-size: 1.45rem;
        line-height: 1.1;
      }

      .app-brand {
        position: relative;
        z-index: 2;
        min-width: 0;
        display: inline-grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        color: var(--ink);
        text-align: left;
      }

      .app-brand.landing-brand {
        justify-self: center;
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }

      .app-brand-mark {
        display: inline-grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border: 1px solid rgba(23, 107, 135, 0.45);
        border-radius: 6px;
        color: #ffffff;
        background: #176b87;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0;
        box-shadow: inset 0 -10px 18px rgba(12, 78, 99, 0.28);
      }

      .landing-brand .app-brand-mark {
        width: 54px;
        height: 54px;
        font-size: 0.95rem;
      }

      .app-brand-copy {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .app-brand-tagline {
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.25;
      }

      .app-status {
        min-width: 96px;
        max-width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 10px;
        color: var(--muted);
        text-align: center;
        background: var(--surface-alt);
      }

      .app-status.ready {
        color: var(--ready);
        border-color: rgba(31, 122, 77, 0.35);
        background: #eef8f2;
      }

      .app-status.error {
        color: var(--danger);
        border-color: rgba(164, 59, 59, 0.35);
        background: #fff0f0;
      }

      .summary-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }

      .summary-item {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        background: var(--surface-alt);
        min-width: 0;
      }

      .summary-label {
        color: var(--muted);
        font-size: 0.76rem;
        text-transform: uppercase;
      }

      .summary-value {
        display: block;
        margin-top: 2px;
        overflow-wrap: anywhere;
      }

      .app-tabs {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .operator-ribbon {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .operator-link {
        align-items: center;
        background: #f7f9fb;
        border: 1px solid var(--line);
        border-radius: 5px;
        color: var(--ink);
        display: inline-flex;
        font-size: 0.85rem;
        font-weight: 700;
        min-height: 34px;
        padding: 0 12px;
        text-decoration: none;
      }

      .operator-link:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .app-tab {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 12px;
        text-decoration: none;
        color: var(--muted);
        background: var(--surface);
      }

      .app-tab.active {
        color: #ffffff;
        border-color: var(--accent-strong);
        background: var(--accent);
      }

      .app-tab:hover,
      .operator-link:hover,
      .app-action-button:hover,
      .chat-context-rename-button:hover,
      .chat-context-delete-button:hover,
      .chat-cancel-button:hover,
      .artifact-download-button:hover,
      .artifact-delete-button:hover {
        border-color: var(--accent);
        color: var(--accent-strong);
      }

      .app-action-button,
      .chat-new-context-button {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 12px;
        color: var(--ink);
        background: var(--surface);
      }

      .app-action-button.primary,
      .chat-new-context-button {
        color: #ffffff;
        border-color: var(--accent-strong);
        background: var(--accent);
      }

      .app-action-button.primary:hover,
      .chat-new-context-button:hover,
      .chat-send-button:hover,
      .artifact-upload-button:hover {
        color: #ffffff;
        background: var(--accent-strong);
      }

      .app-action-button.danger {
        color: var(--danger);
        border-color: rgba(164, 59, 59, 0.45);
        background: #fff7f7;
      }

      .app-main {
        width: 100%;
        max-width: 1480px;
        margin: 0 auto;
        padding: 16px 20px 24px;
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, 1fr);
      }

      .workspace {
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, 1fr);
      }

      .routes-panel {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        padding: 12px;
      }

      .routes-panel h2,
      .chat-section-title,
      .artifacts-section-title {
        margin: 0 0 8px;
        font-size: 0.92rem;
        line-height: 1.25;
      }

      .routes-panel ul {
        display: grid;
        gap: 4px;
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .chat-view,
      .artifacts-view {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
      }

      .chat-view {
        display: grid;
        grid-template-columns: minmax(180px, 260px) minmax(0, 1fr);
        min-height: 620px;
      }

      .chat-context-rail {
        border-right: 1px solid var(--line);
        padding: 12px;
        background: var(--surface-alt);
      }

      .chat-context-list,
      .artifact-list {
        display: grid;
        gap: 8px;
      }

      .chat-model-picker {
        display: grid;
        gap: 5px;
        margin-bottom: 12px;
      }

      .chat-new-context-button {
        width: 100%;
        margin-bottom: 12px;
      }

      .chat-new-context-dialog {
        display: grid;
        gap: 10px;
        margin-bottom: 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        background: #ffffff;
        box-shadow: 0 8px 24px rgba(20, 32, 39, 0.08);
      }

      .chat-new-context-title {
        margin: 0;
        font-size: 0.95rem;
      }

      .chat-new-context-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .chat-new-context-create-button,
      .chat-new-context-cancel-button {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 10px;
        color: var(--ink);
        background: var(--surface);
      }

      .chat-new-context-create-button {
        color: #ffffff;
        border-color: var(--accent-strong);
        background: var(--accent);
      }

      .chat-control-label {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .chat-model-select,
      .chat-draft-input,
      .artifact-mime-input,
      .artifact-display-name-input,
      .artifact-file-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px;
        color: var(--ink);
        background: #ffffff;
      }

      .chat-context-item {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px;
        text-align: left;
        color: var(--ink);
        background: #ffffff;
      }

      .chat-context-item.active {
        border-color: var(--accent);
        background: var(--accent-soft);
        box-shadow: inset 3px 0 0 var(--accent);
      }

      .chat-context-item.soft-deleted {
        color: var(--muted);
        background: #f7f9fa;
      }

      .chat-context-select {
        width: 100%;
        border: 0;
        padding: 0;
        text-align: left;
        color: inherit;
        background: transparent;
      }

      .chat-context-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 6px;
        margin-top: 8px;
      }

      .chat-context-rename-input {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 7px;
        background: #ffffff;
      }

      .chat-context-rename-button,
      .chat-context-delete-button {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 8px;
        color: var(--ink);
        background: var(--surface);
      }

      .chat-context-delete-button {
        color: var(--danger);
      }

      .chat-context-delete-button:disabled {
        color: var(--muted);
        cursor: not-allowed;
      }

      .chat-context-title,
      .chat-context-model {
        display: block;
        overflow-wrap: anywhere;
      }

      .chat-context-model,
      .artifact-metadata,
      .chat-message-label,
      .chat-empty-state,
      .artifact-empty-state {
        color: var(--muted);
        font-size: 0.85rem;
      }

      .chat-conversation-pane {
        min-width: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .chat-conversation-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 12px;
      }

      .chat-pending-indicator {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 4px 8px;
        color: var(--muted);
        white-space: nowrap;
      }

      .chat-pending-indicator.warning {
        color: var(--danger);
        border-color: rgba(164, 59, 59, 0.35);
        background: #fff0f0;
      }

      .chat-message-list {
        display: grid;
        align-content: start;
        gap: 10px;
        overflow: auto;
        padding: 12px;
      }

      .chat-message {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        background: #ffffff;
      }

      .chat-message.prompt {
        border-left: 3px solid var(--accent);
      }

      .chat-message.result {
        border-left: 3px solid var(--ready);
      }

      .chat-message.cancel {
        border-left: 3px solid var(--danger);
      }

      .chat-message-body {
        margin: 4px 0 0;
        overflow-wrap: anywhere;
      }

      .chat-result-artifact {
        display: block;
        margin-top: 8px;
        max-width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-alt);
      }

      .chat-draft-editor {
        display: grid;
        gap: 8px;
        border-top: 1px solid var(--line);
        padding: 12px;
      }

      .chat-draft-input {
        min-height: 96px;
        resize: vertical;
      }

      .chat-send-button,
      .artifact-upload-button {
        border: 1px solid var(--accent-strong);
        border-radius: 6px;
        padding: 8px 12px;
        color: #ffffff;
        background: var(--accent);
      }

      .chat-cancel-button,
      .artifact-download-button {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 12px;
        color: var(--ink);
        background: var(--surface-alt);
      }

      .artifacts-view {
        display: grid;
        gap: 12px;
        padding: 12px;
      }

      .files-view {
        display: grid;
        gap: 12px;
      }

      .artifact-upload-panel,
      .artifact-list-section {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 12px;
        background: var(--surface-alt);
      }

      .artifact-upload-panel {
        display: grid;
        gap: 8px;
      }

      .artifact-upload-progress {
        width: 100%;
      }

      .artifact-upload-status {
        min-height: 20px;
        margin: 0;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .files-status {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .artifact-upload-status.ready {
        color: var(--ready);
      }

      .artifact-upload-status.error {
        color: var(--danger);
      }

      .artifact-entry {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        background: #ffffff;
        display: grid;
        gap: 8px;
      }

      .artifact-title {
        margin: 0;
        font-size: 0.95rem;
        overflow-wrap: anywhere;
      }

      .artifact-preview-image,
      .artifact-preview-video,
      .artifact-preview-pdf {
        width: 100%;
        max-height: 260px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-alt);
      }

      .artifact-preview-audio {
        width: 100%;
      }

      .artifact-preview-text {
        max-height: 180px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px;
        color: var(--ink);
        background: var(--surface-alt);
      }

      .artifact-preview-placeholder,
      .artifact-preview-midi,
      .artifact-preview-musicxml,
      .artifact-preview-zip,
      .artifact-preview-download-only {
        margin: 0;
        border: 1px dashed var(--line);
        border-radius: 6px;
        padding: 10px;
        color: var(--muted);
        background: var(--surface-alt);
      }

      .artifact-midi-pianoroll {
        display: block;
        width: 100%;
        max-width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #ffffff;
      }

      .artifact-midi-play {
        margin-top: 8px;
      }

      .artifact-zip-stem-name {
        margin: 10px 0 4px;
        color: var(--ink);
        font-weight: 700;
      }

      .artifact-zip-stem-audio {
        width: 100%;
      }

      .artifact-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .artifact-delete-button {
        border: 1px solid rgba(164, 59, 59, 0.45);
        border-radius: 6px;
        padding: 8px 12px;
        color: var(--danger);
        background: #fff7f7;
      }

      @media (min-width: 1180px) {
        .app-main {
          grid-template-columns: minmax(0, 1fr) 300px;
          align-items: start;
        }

        .workspace {
          grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        }
      }

      @media (max-width: 760px) {
        .app-title-row,
        .app-tabs,
        .app-actions,
        .operator-ribbon {
          align-items: stretch;
          flex-direction: column;
        }

        .chat-view {
          grid-template-columns: 1fr;
        }

        .chat-context-rail {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }

      @media (max-width: 520px) {
        .app-landing-card {
          padding: 26px 20px;
        }

        .app-brand {
          grid-template-columns: auto minmax(0, 1fr);
          width: 100%;
        }

        .app-brand.landing-brand {
          width: auto;
        }

        .app-actions,
        .app-tabs,
        .operator-ribbon {
          width: 100%;
        }

        .app-action-button,
        .app-tab,
        .operator-link,
        .app-status {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body class="auth-unknown">
    <div class="app-landing">
      <div class="app-landing-card">
        <div class="app-brand landing-brand">
          <span class="app-brand-mark" aria-hidden="true">Ix</span>
          <div class="app-brand-copy">
            <h1>Infernix</h1>
            <p class="app-landing-subtitle">Durable-context inference console</p>
          </div>
        </div>
        <div class="app-landing-actions">
          <button id="login-button" class="app-action-button primary" type="button">Sign in</button>
          <button id="register-button" class="app-action-button" type="button">Create account</button>
        </div>
      </div>
    </div>
    <div class="app-shell">
      <header class="app-header">
        <div class="app-header-inner">
          <div class="app-title-row">
            <div class="app-brand header-brand">
              <span class="app-brand-mark" aria-hidden="true">Ix</span>
              <div class="app-brand-copy">
                <h1>Infernix</h1>
                <span class="app-brand-tagline">Durable-context inference console</span>
              </div>
            </div>
            <div class="app-actions">
              <button id="logout-button" class="app-action-button" type="button">Sign out</button>
              <button id="delete-account-button" class="app-action-button danger" type="button">Delete account</button>
              <div id="app-status" class="app-status">Loading</div>
            </div>
          </div>
          <nav class="app-tabs" aria-label="Workspace">
            <a id="route-chat" class="app-tab active" href="/">Chat</a>
            <a id="route-artifacts" class="app-tab" href="/artifacts">Artifacts</a>
            <a id="route-files" class="app-tab" href="/files">Files</a>
          </nav>
          <nav class="operator-ribbon" aria-label="Operator consoles">
            <a class="operator-link" data-operator-route="/harbor" href="/harbor" target="_blank" rel="noreferrer">Harbor</a>
            <a class="operator-link" data-operator-route="/pulsar/admin" href="/pulsar/admin/admin/v2/clusters" target="_blank" rel="noreferrer">Pulsar Admin</a>
          </nav>
          <div class="summary-grid">
            <div class="summary-item">
              <span class="summary-label">Runtime</span>
              <strong id="runtime-mode" class="summary-value">loading</strong>
            </div>
            <div class="summary-item">
              <span class="summary-label">Control Plane</span>
              <strong id="control-plane-context" class="summary-value">loading</strong>
            </div>
            <div class="summary-item">
              <span class="summary-label">Daemon</span>
              <strong id="daemon-location" class="summary-value">loading</strong>
            </div>
            <div class="summary-item">
              <span class="summary-label">Dispatch</span>
              <strong id="inference-dispatch-mode" class="summary-value">loading</strong>
            </div>
            <div class="summary-item">
              <span class="summary-label">Edge</span>
              <strong id="edge-port" class="summary-value">loading</strong>
            </div>
            <div class="summary-item">
              <span class="summary-label">Catalog</span>
              <strong id="catalog-count" class="summary-value">0</strong>
            </div>
            <div class="summary-item">
              <span class="summary-label">Connection</span>
              <strong id="connection-state" class="summary-value">loading</strong>
            </div>
          </div>
        </div>
      </header>
      <main class="app-main">
        <section class="workspace" aria-label="Durable context workspace">
          <div id="chat-root"></div>
          <div id="artifacts-root"></div>
          <div id="files-root"></div>
        </section>
